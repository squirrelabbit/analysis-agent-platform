name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Python worker tests
        run: PYTHONPATH=workers/python-ai/src python -m unittest discover -s workers/python-ai/tests -p 'test_*.py'

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/control-plane/go.mod
      - name: Run Go tests
        working-directory: apps/control-plane
        run: go test ./...
      - name: Build Go binaries
        working-directory: apps/control-plane
        run: go build ./...
