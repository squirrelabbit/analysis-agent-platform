openapi: 3.1.0
info:
  title: Analysis Support Platform Frontend API
  version: 0.1.0
  summary: 프론트 화면 연동에 필요한 필수 API subset
  description: |
    프론트엔드 화면이 사용하는 API만 추린 축약본. 운영자 / 백엔드 디버그용
    전체 명세는 [`openapi.yaml`](./openapi.yaml)을 본다.

    ## 포함 범위

    1. 런타임 상태 — 헬스/상태 표시
    2. 프로젝트 CRUD
    3. dataset CRUD + active version 설정
    4. 파일 업로드 + dataset version 조회/삭제 + 원본/clean 다운로드

    ## 제외 항목

    아래는 운영자/디버그 용도라 화면에서 사용하지 않는다:

    - dataset_build (clean / doc_genuineness / clause_label) 큐잉 POST
    - dataset_build job polling / 이력 조회
    - 분석 실행 (`analysis_thread`/`analysis_message`/`analysis_run` 흐름:
      `/analyze`, `/analysis_threads`, `/analysis_threads/{tid}/messages`,
      `/analysis_runs/{run_id}`, version 고정 debug용 `/versions/{vid}/analyze`).
      응답 `result.composer`는 사용자-facing `assistant_content`/`display`/
      `context_summary`를 분리해 노출 (ADR-020 PR-A, deterministic v1). 화면
      통합은 단계적 — vault `analysis_api_model_2026-05-26` 모델 참조.

      **Frontend 표시 정책 (silverone 2026-05-28, "플랜만 표시" cut)**:
      analyze 응답에서 프론트가 사용하는 필드는 다음 4개로 제한한다.
      운영자/debug 필드는 화면에 노출하지 않는다.

      | 화면 영역 | 사용 필드 | 비고 |
      |---|---|---|
      | 기본 답변 본문 | `result.composer.assistant_content` | ADR-020 PR-A |
      | 기본 표/차트 | `result.composer.display` | columns/rows/total_rows/truncated |
      | 경고 배너 | `result.composer.display.warnings` | empty / truncated / null ratio |
      | 분석 상세 패널 | `result.plan` (`AnalyzePlanView`) | plan_version + steps[].id/.skill/.params 만 |

      operator/debug 전용 (frontend 노출 X): `result.steps`,
      `result.steps[].sample_rows`, SQL/query, `result.plan.steps[].inputs`,
      `result.planner.attempts[].raw`, `result.planner.usage`,
      `result.artifact_paths`, `result.composer.context_summary`. 자세한 schema는
      `openapi.yaml`의 `AnalyzePlanView` / `AnalyzePlanStepView` / `ComposerOutput`
      / `ComposerDisplay` 참조.
    - 프로젝트 prompt 관리

    필요해지면 단계적으로 본 문서에 추가한다.
servers:
  - url: http://127.0.0.1:18080
    description: 로컬 개발 서버 (compose dev)
tags:
  - name: System
    description: 헬스 체크 / 런타임 상태
  - name: Projects
    description: 프로젝트 CRUD
  - name: Datasets
    description: dataset / dataset version / 업로드 / 다운로드
paths:
  /runtime_status:
    get:
      tags: [System]
      summary: 런타임 상태 + Temporal 연결 상태
      description: 화면 시작 시 한 번 호출. workflow engine / store backend 상태 표시.
      operationId: getRuntimeStatus
      responses:
        "200":
          description: 런타임 상태
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeStatusResponse"
  /taxonomy:
    get:
      tags: [System]
      summary: aspect/sentiment taxonomy 정의 (key/label/description)
      description: |
        clause 결과 화면에서 aspect를 한글로 표시하기 위한 정의. 각 aspect의
        `key`(영문, artifact 값) → `label`(한글) 매핑을 담는다. `taxonomy_id`
        미지정 시 default(현재 `festival-v2`). 알 수 없는 id는 400.
      operationId: getTaxonomy
      parameters:
        - name: taxonomy_id
          in: query
          required: false
          schema:
            type: string
            example: festival-v2
          description: taxonomy 식별자. 미지정 시 default.
      responses:
        "200":
          description: taxonomy 정의
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonomyResponse"
        "400":
          description: 알 수 없는 taxonomy_id 또는 config 파싱 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects:
    get:
      tags: [Projects]
      summary: 프로젝트 목록 조회
      operationId: listProjects
      responses:
        "200":
          description: 프로젝트 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
    post:
      tags: [Projects]
      summary: 프로젝트 생성
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
      responses:
        "201":
          description: 프로젝트 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}:
    get:
      tags: [Projects]
      summary: 프로젝트 단건 조회
      operationId: getProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: 프로젝트 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Projects]
      summary: 프로젝트 삭제
      description: 프로젝트와 그 아래 모든 dataset / version / artifact를 함께 삭제한다.
      operationId: deleteProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "204":
          description: 삭제 완료
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets:
    get:
      tags: [Datasets]
      summary: dataset 목록 조회
      operationId: listDatasets
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: dataset 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetListResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Datasets]
      summary: dataset 생성
      operationId: createDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetCreateRequest"
      responses:
        "201":
          description: dataset 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}:
    get:
      tags: [Datasets]
      summary: dataset 단건 조회
      operationId: getDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: dataset 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Datasets]
      summary: dataset 삭제
      description: dataset과 그 아래 모든 version / artifact 함께 삭제.
      operationId: deleteDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "204":
          description: 삭제 완료
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/active_version:
    put:
      tags: [Datasets]
      summary: 활성 dataset version 설정
      description: 분석 endpoint가 자동으로 사용할 version을 지정. 다른 version으로 바꾸려면 다시 호출.
      operationId: activateDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetActiveVersionUpdateRequest"
      responses:
        "200":
          description: 활성 version 갱신 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Datasets]
      summary: 활성 dataset version 해제
      description: 어떤 version도 활성으로 두지 않는 상태로 되돌린다. 분석은 명시 version path로만 가능해진다.
      operationId: deactivateDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: 활성 version 해제 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/uploads:
    post:
      tags: [Datasets]
      summary: 원본 파일 업로드 + dataset version 생성
      description: |
        multipart/form-data로 파일을 업로드하면 dataset version이 생성된다.
        `activate_on_create=true` (기본)면 활성 version으로도 자동 설정.
        `metadata.text_columns`가 있으면 clean 단계가 자동 큐잉됨.
      operationId: uploadDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DatasetUploadRequest"
      responses:
        "201":
          description: dataset version 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersion"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions:
    get:
      tags: [Datasets]
      summary: dataset version 목록 조회
      description: 활성 version + 비활성 모든 version. 화면 좌측 목록 렌더링용.
      operationId: listDatasetVersions
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: version 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersionListResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}:
    get:
      tags: [Datasets]
      summary: dataset version 상세 조회
      description: clean / doc_genuineness / clause_label 각 단계 status + 요약. 화면 우측 패널 렌더링용.
      operationId: getDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: version 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersion"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Datasets]
      summary: dataset version 삭제
      description: 해당 version의 artifact 모두 정리. 활성 version 삭제 시 active_dataset_version_id가 자동으로 null이 된다.
      operationId: deleteDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "204":
          description: 삭제 완료
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/source_download:
    get:
      tags: [Datasets]
      summary: 원본 업로드 파일 다운로드
      description: 업로드 API로 저장된 원본 파일을 그대로 내려준다.
      operationId: downloadDatasetSource
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: 원본 파일 binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/clean_download:
    get:
      tags: [Datasets]
      summary: clean 결과 CSV 다운로드
      description: clean이 완료된 dataset의 정제된 텍스트를 CSV(UTF-8 BOM)로 받는다. 한글 Excel에서 그대로 열 수 있다.
      operationId: downloadCleanedDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: CSV (UTF-8 BOM) 스트림
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
components:
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
    DatasetId:
      name: dataset_id
      in: path
      required: true
      schema:
        type: string
    VersionId:
      name: version_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
      required: [detail]
    TaxonomyAspect:
      type: object
      description: 단일 aspect 정의. key는 artifact에 저장되는 영문 식별자, label은 표시용 한글.
      properties:
        key:
          type: string
          example: food
        label:
          type: string
          example: 음식
        description:
          type: string
      required: [key, label, description]
    TaxonomyResponse:
      type: object
      description: GET /taxonomy 응답. aspect key→한글 label 매핑 등 taxonomy 정의.
      properties:
        taxonomy_id:
          type: string
          example: festival-v2
        domain:
          type: string
          example: festival
        aspects:
          type: array
          description: aspect 정의 목록 (config 정의 순서 유지).
          items:
            $ref: "#/components/schemas/TaxonomyAspect"
        sentiments:
          type: array
          items:
            type: string
          example: [positive, negative, neutral]
        fallback_aspect:
          type: string
          example: etc
        taxonomy_hash:
          type: string
      required: [taxonomy_id, domain, aspects, sentiments, fallback_aspect, taxonomy_hash]
    AnyMap:
      type: object
      additionalProperties: true
    IntegerMap:
      type: object
      additionalProperties:
        type: integer
    StringList:
      type: array
      items:
        type: string
    RuntimeStatusTemporal:
      type: object
      additionalProperties: true
    RuntimeStatusResponse:
      type: object
      properties:
        status:
          type: string
        stack:
          type: string
        workflow_engine:
          type: string
        store_backend:
          type: string
        planner_backend:
          type: string
        temporal:
          anyOf:
            - $ref: "#/components/schemas/RuntimeStatusTemporal"
            - type: "null"
      required: [status, stack]
    Project:
      type: object
      properties:
        project_id:
          type: string
        name:
          type: string
        description:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        dataset_count:
          type: integer
        dataset_version_count:
          type: integer
        scenario_count:
          type: integer
        prompt_count:
          type: integer
      required: [project_id, name, created_at, dataset_count, dataset_version_count, scenario_count, prompt_count]
    ProjectCreateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type:
            - string
            - "null"
      required: [name]
    ProjectListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"
      required: [items]
    Dataset:
      type: object
      properties:
        dataset_id:
          type: string
        project_id:
          type: string
        name:
          type: string
        description:
          type:
            - string
            - "null"
        data_type:
          type: string
        active_dataset_version_id:
          type:
            - string
            - "null"
        active_version_updated_at:
          type:
            - string
            - "null"
          format: date-time
        created_at:
          type: string
          format: date-time
      required: [dataset_id, project_id, name, data_type, created_at]
    DatasetCreateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type:
            - string
            - "null"
        data_type:
          type:
            - string
            - "null"
      required: [name]
    DatasetListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Dataset"
      required: [items]
    DatasetActiveVersionUpdateRequest:
      type: object
      properties:
        dataset_version_id:
          type: string
      required: [dataset_version_id]
    DatasetProfile:
      type: object
      additionalProperties: true
    DatasetSourceColumnSummary:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
      required: [name]
    DatasetSourceSummary:
      type: object
      properties:
        available:
          type: boolean
        status:
          type: string
          enum: [ready, missing, unsupported, error, unavailable]
          description: 원본 요약 상태. ready면 columns/row_count/sample_rows가 채워진다.
        format:
          type: string
          description: "원본 파일 포맷. 예: csv, tsv, parquet, jsonl."
        row_count:
          type:
            - integer
            - "null"
        column_count:
          type: integer
        columns:
          type: array
          items:
            $ref: "#/components/schemas/DatasetSourceColumnSummary"
        sample_limit:
          type: integer
        sample_rows:
          type: array
          items:
            $ref: "#/components/schemas/AnyMap"
        error_message:
          type: string
      required: [available]
    DatasetVersionBuildJobStatus:
      type: object
      properties:
        job_id:
          type: string
        build_type:
          type: string
          enum: [clean, doc_genuineness, clause_label]
          description: |
            현재 hot path dataset_build task 3종 (ADR-018 β2 결정).
            옛 prepare / sentiment / embedding / cluster 류는 모두 삭제됨.
        status:
          type: string
        triggered_by:
          type: string
        attempt:
          type: integer
        created_at:
          type: string
          format: date-time
        started_at:
          type:
            - string
            - "null"
          format: date-time
        completed_at:
          type:
            - string
            - "null"
          format: date-time
        error_message:
          type:
            - string
            - "null"
        diagnostics:
          anyOf:
            - $ref: "#/components/schemas/BuildJobDiagnostics"
            - type: "null"
      required: [job_id, build_type, status, attempt, created_at]
    BuildJobDiagnostics:
      type: object
      properties:
        retry_count:
          type: integer
        last_error_type:
          type:
            - string
            - "null"
        last_error_message:
          type:
            - string
            - "null"
        workflow_id:
          type:
            - string
            - "null"
        workflow_run_id:
          type:
            - string
            - "null"
        progress:
          anyOf:
            - $ref: "#/components/schemas/BuildJobProgress"
            - type: "null"
        llm_fallback:
          type: boolean
          description: LLM 호출 실패 후 deterministic fallback이 사용되었는지 여부
        llm_fallback_reason:
          type:
            - string
            - "null"
          description: LLM fallback이 발생한 대표 사유
        llm_fallback_count:
          type: integer
          description: LLM fallback이 적용된 row 수
        llm_provider:
          type:
            - string
            - "null"
          description: fallback 전 시도한 LLM provider
        llm_model:
          type:
            - string
            - "null"
          description: fallback 전 시도한 LLM model
        warnings:
          type: array
          items:
            type: string
      required: [retry_count]
    BuildJobProgress:
      type: object
      properties:
        percent:
          type: number
          format: float
        processed_rows:
          type: integer
        total_rows:
          type: integer
        elapsed_seconds:
          type: number
          format: float
        eta_seconds:
          type:
            - number
            - "null"
          format: float
        message:
          type: string
        updated_at:
          type:
            - string
            - "null"
          format: date-time
      required: [percent, processed_rows, total_rows]
    DatasetVersion:
      type: object
      properties:
        dataset_version_id:
          type: string
        dataset_id:
          type: string
        project_id:
          type: string
        storage_uri:
          type: string
        data_type:
          type: string
        record_count:
          type:
            - integer
            - "null"
        metadata:
          $ref: "#/components/schemas/AnyMap"
        source_summary:
          anyOf:
            - $ref: "#/components/schemas/DatasetSourceSummary"
            - type: "null"
        build_jobs:
          type: array
          items:
            $ref: "#/components/schemas/DatasetVersionBuildJobStatus"
        build_stages:
          type: array
          description: source, clean, prepare, sentiment, embedding, cluster를 프론트 상태 표시용으로 정규화한 단계별 상태
          items:
            $ref: "#/components/schemas/DatasetVersionBuildStage"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/DatasetVersionArtifact"
        profile:
          anyOf:
            - $ref: "#/components/schemas/DatasetProfile"
            - type: "null"
        clean_status:
          type: string
          description: deterministic text clean stage status
        clean_uri:
          type:
            - string
            - "null"
        cleaned_ref:
          type:
            - string
            - "null"
        cleaned_at:
          type:
            - string
            - "null"
          format: date-time
        clean_summary:
          anyOf:
            - $ref: "#/components/schemas/DatasetCleanSummary"
            - type: "null"
        # ADR-018 β2 — prepare/sentiment/embedding 단계 삭제로 관련 top-level 응답 필드
        # (prepare_status / prepare_llm_mode / prepare_model / prepare_prompt_version /
        # prepare_uri / prepared_at / sentiment_* / embedding_*) 제거. 응답은 더 이상
        # 이 필드를 반환하지 않는다 (clean/doc_genuineness/clause_label만 hot path).
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        ready_at:
          type:
            - string
            - "null"
          format: date-time
      required: [dataset_version_id, dataset_id, project_id, storage_uri, data_type, metadata, clean_status, is_active, created_at]
    DatasetVersionBuildStage:
      type: object
      properties:
        stage:
          type: string
          enum: [source, clean, prepare, sentiment, embedding, cluster]
          description: |
            현재 hot path는 clean / doc_genuineness / clause_label 3단계다 (ADR-018 β2).
            prepare / sentiment / embedding / cluster는 deprecated (단계 삭제됨) — enum 축소는
            frontend 협의 후 별도 진행 예정이라 값은 유지한다.
        status:
          type: string
        applicable:
          type: boolean
        required:
          type: boolean
        ready:
          type: boolean
        depends_on:
          type: array
          description: 이 stage가 논리적으로 의존하는 stage 목록. sentiment와 embedding은 모두 prepare에만 의존하므로 병렬 실행 가능하다.
          items:
            type: string
            enum: [source, clean, prepare, sentiment, embedding, cluster]
        can_run:
          type: boolean
          description: 현재 상태에서 해당 stage 실행 API를 호출할 수 있는지 여부
        run_group:
          type: string
          description: 프론트 병렬/순차 표시용 실행 그룹. sentiment와 embedding은 post_prepare 그룹이다.
        auto_run_eligible:
          type: boolean
          description: required 설정과 현재 의존성 기준으로 자동 실행 대상이 될 수 있는지 여부
        blocked_reason:
          type:
            - string
            - "null"
        latest_job:
          anyOf:
            - $ref: "#/components/schemas/DatasetVersionBuildJobStatus"
            - type: "null"
        primary_artifact:
          anyOf:
            - $ref: "#/components/schemas/DatasetVersionArtifact"
            - type: "null"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/DatasetVersionArtifact"
        summary:
          $ref: "#/components/schemas/AnyMap"
        model:
          type: string
        prompt_version:
          type: string
        error_message:
          type:
            - string
            - "null"
        diagnostics:
          anyOf:
            - $ref: "#/components/schemas/BuildJobDiagnostics"
            - type: "null"
      required: [stage, status, applicable, required, ready, depends_on, can_run, run_group, auto_run_eligible]
    DatasetVersionArtifact:
      type: object
      properties:
        artifact_id:
          type: string
        project_id:
          type: string
        dataset_id:
          type: string
        dataset_version_id:
          type: string
        artifact_type:
          type: string
          description: source, clean, prepare, sentiment, embedding, cluster_summary 등 산출물 유형
        stage:
          type: string
          description: source, clean, prepare, sentiment, embedding, cluster 등 파이프라인 단계
        status:
          type: string
        uri:
          type: string
        format:
          type: string
        model:
          type: string
        prompt_version:
          type: string
        summary:
          $ref: "#/components/schemas/AnyMap"
        metadata:
          $ref: "#/components/schemas/AnyMap"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [artifact_id, project_id, dataset_id, dataset_version_id, artifact_type, stage, status, created_at, updated_at]
    DatasetUploadRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
        data_type:
          type: string
        metadata:
          type: string
          description: JSON object string. 업로드 직후 자동 clean을 실행하려면 text_columns가 필요하다.
          example: '{"text_columns":["제목","본문"]}'
        activate_on_create:
          type: string
          enum: ["true", "false"]
        # ADR-018 β2 — prepare/sentiment/embedding 단계 삭제로 upload 핸들러는 아래 5
        # field를 더 이상 읽지 않는다 (보내도 무시됨, no-op). 클라이언트 호환을 위해
        # schema에는 남기되 deprecated 표시.
        prepare_required:
          type: string
          enum: ["true", "false"]
          deprecated: true
          description: "[deprecated] ADR-018 β2로 무시됨 (no-op). prepare 단계는 삭제됐다."
        prepare_llm_mode:
          type: string
          enum: [default, enabled, disabled]
          deprecated: true
          description: "[deprecated] ADR-018 β2로 무시됨 (no-op)."
        sentiment_required:
          type: string
          enum: ["true", "false"]
          deprecated: true
          description: "[deprecated] ADR-018 β2로 무시됨 (no-op). sentiment 단계는 삭제됐다."
        sentiment_llm_mode:
          type: string
          enum: [default, enabled, disabled]
          deprecated: true
          description: "[deprecated] ADR-018 β2로 무시됨 (no-op)."
        embedding_required:
          type: string
          enum: ["true", "false"]
          deprecated: true
          description: "[deprecated] ADR-018 β2로 무시됨 (no-op). embedding 단계는 삭제됐다."
      required: [file]
    DatasetVersionListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DatasetVersion"
      required: [items]
    DatasetCleanSummary:
      type: object
      properties:
        input_row_count:
          type: integer
        output_row_count:
          type: integer
        kept_count:
          type: integer
        dropped_count:
          type: integer
        skipped_row_count:
          type: integer
        text_column:
          type: string
        text_columns:
          type: array
          items:
            type: string
        text_joiner:
          type: string
        source_input_char_count:
          type: integer
        cleaned_input_char_count:
          type: integer
        clean_reduced_char_count:
          type: integer
        clean_regex_rule_hits:
          $ref: "#/components/schemas/IntegerMap"
      required: [input_row_count, output_row_count, kept_count, dropped_count]
