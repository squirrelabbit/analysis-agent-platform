openapi: 3.1.0
info:
  title: Analysis Support Platform Control Plane API
  version: 0.1.0
  summary: 분석 지원 플랫폼 Go control-plane API (전체 명세)
  description: |
    Go control-plane이 노출하는 전체 HTTP API 명세다. 백엔드/운영자 도구가
    참조하는 기준 문서. 프론트엔드 화면용 축약본은
    [`openapi.frontend.yaml`](./openapi.frontend.yaml)에 있다.

    ## 전체 흐름

    1. **프로젝트 생성** — `POST /projects`
    2. **dataset 생성 + 파일 업로드** — `POST /projects/{pid}/datasets` →
       `POST /projects/{pid}/datasets/{did}/uploads`로 raw 파일 업로드.
       업로드 즉시 `dataset_version`이 만들어지고, `metadata.text_columns`가
       있으면 clean도 자동 큐잉된다.
    3. **dataset_build 단계** — clean → doc_genuineness → clause_label 3단계.
       각 단계는 `POST /versions/{vid}/{단계}`로 큐잉(202 + `job_id`)하고,
       `GET /versions/{vid}/{단계}` 같은 path GET을 화면이 1~2초 주기로 polling한다.
       view는 status / progress / error_message / summary / (단계별) items를
       묶어서 반환하므로 build job endpoint를 직접 호출할 필요가 없다.
    4. **분석 실행 / 채팅형 thread** — 중심 객체는 `analysis_thread` +
       `analysis_message` + `analysis_run` 3개. endpoint는 모두 이 모델을 다루는
       shortcut/이어질문/debug의 세 갈래로 정리된다.
       - 첫 turn shortcut: `POST /datasets/{did}/analyze`, body
         `{user_question: "..."}` 1 필드. active version을 1회 resolve해
         `thread.dataset_version_id`로 **고정**하고 첫 user message + run을 저장한다.
       - 이어질문: `POST /datasets/{did}/analysis_threads/{tid}/messages`,
         body `{content: "..."}`. thread에 잠긴 dataset_version_id 그대로 분석한다.
         이어질문은 rule-based plan reuse를 먼저 시도하고 실패하면 planner LLM으로
         fallback (응답에 `result.reuse` metadata 노출). 최근 assistant
         `context_summary` 3턴/2000 bytes를 worker에 inject.
       - debug/replay: `POST /versions/{vid}/analyze`, body `{plan: {...}}` 1 필드.
         user_question은 받지 않고 thread/message/run 저장도 없는 stateless 흐름.
       - 실패 시(이어질문/첫 turn 공통): `analysis_run.status=failed` +
         assistant placeholder message가 thread에 저장된다. 응답 자체는 HTTP error.
       - 실행은 현재 모두 sync HTTP. async 전환 및 step status 분리는 후속
         (vault `analysis_api_model_2026-05-26` §7-8).

    ## build job endpoint 역할 분리 원칙 (2026-05-22 확정)

    - `POST /versions/{vid}/{단계}` — build job **접수만** 담당. 응답은 slim
      `DatasetBuildJobAccepted` (job_id, build_type, status, created_at).
    - `GET /versions/{vid}/{단계}` — **화면 polling/status/result 조회 단일
      진입점**. status / progress / summary / items / applied / error_message
      모두 묶어서 반환. 화면은 이 endpoint만 polling한다.
    - `GET /dataset_build_jobs/{job_id}` — **debug / audit 전용**. Temporal
      workflow 추적 / 운영자 디버그용. **화면 polling에 쓰지 않는다.**
    - `GET /versions/{vid}/build_jobs` (list) — Phase 3 (2026-05-22) 정리로
      제거됨. retry 이력 trace가 필요하면 Temporal UI / DB 직접 조회.

    ## storage_uri 규칙

    `dataset_version.storage_uri`는 원본 dataset 파일의 절대 경로다.
    `uploads` API를 쓰면 서버가 `UPLOAD_ROOT` 아래에 저장한 실제 경로로 자동
    채운다. 외부 시스템 경로를 직접 다루려면 `versions` API에 절대 경로를 명시.
servers:
  - url: http://127.0.0.1:18080
    description: 로컬 개발 서버 (compose dev)
tags:
  - name: System
    description: 헬스 체크 / 런타임 상태 등 운영용 메타 엔드포인트
  - name: Projects
    description: 프로젝트 + 프로젝트 prompt 관리
  - name: Datasets
    description: dataset / dataset version / build / 다운로드
  - name: Analysis
    description: 저장형 analysis thread / message / run + plan replay
paths:
  /health:
    get:
      tags: [System]
      summary: 헬스 체크
      description: 서버가 살아있는지 단순 확인. 인증 불필요.
      operationId: getHealth
      responses:
        "200":
          description: 정상 상태
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /runtime_status:
    get:
      tags: [System]
      summary: 런타임 상태 + Temporal 연결 상태
      description: workflow engine / store backend / Temporal 연결 정보 등 운영 진단용 메타.
      operationId: getRuntimeStatus
      responses:
        "200":
          description: 런타임 상태
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeStatusResponse"
  /prompt_options:
    get:
      tags: [System]
      summary: task별 prompt 선택지 (version/default/label)
      description: |
        task-folder prompt(`config/prompts/<task>/<version>.md` + index.yaml)의
        선택 가능한 version 목록과 default, label을 반환한다. label은 md 본문 첫
        H1, 없으면 version. **prompt 본문/파일 경로는 반환하지 않는다.**

        control-plane은 파일을 직접 읽지 않고 Python worker로 proxy한다.
        현재 지원 task: `doc_genuineness`, `clause_label`. (planner prompt는 옛
        flat 구조라 이 endpoint 대상 아님.)
      operationId: getPromptOptions
      parameters:
        - name: task
          in: query
          required: true
          schema:
            type: string
            example: doc_genuineness
          description: prompt task 폴더명. 미지정/미존재 task는 400.
      responses:
        "200":
          description: prompt 선택지
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptOptionsResponse"
        "400":
          description: task 누락 또는 알 수 없는 task / index.yaml 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /taxonomy:
    get:
      tags: [System]
      summary: aspect/sentiment taxonomy 정의 (key/label/description)
      description: |
        clause_label aspect/sentiment taxonomy의 정의를 반환한다. 각 aspect의
        `key`(영문 식별자, artifact에 저장되는 값) → `label`(한글 표시명) →
        `description` 매핑을 담아 프론트가 aspect를 한글로 표시할 수 있게 한다.

        control-plane은 `config/taxonomies/<id>.json`을 직접 읽지 않고 Python
        worker로 proxy한다. `taxonomy_id` 미지정 시 default(현재 `festival-v2`).
        aspects 순서는 config 정의 순서를 그대로 유지한다.
      operationId: getTaxonomy
      parameters:
        - name: taxonomy_id
          in: query
          required: false
          schema:
            type: string
            example: festival-v2
          description: taxonomy 식별자. 미지정 시 worker default. 알 수 없는 id는 400.
      responses:
        "200":
          description: taxonomy 정의
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonomyResponse"
        "400":
          description: 알 수 없는 taxonomy_id 또는 config 파싱 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects:
    get:
      tags: [Projects]
      summary: 프로젝트 목록 조회
      operationId: listProjects
      responses:
        "200":
          description: 프로젝트 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
    post:
      tags: [Projects]
      summary: 프로젝트 생성
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
      responses:
        "201":
          description: 프로젝트 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}:
    get:
      tags: [Projects]
      summary: 프로젝트 단건 조회
      operationId: getProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: 프로젝트 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Projects]
      summary: 프로젝트 삭제
      description: 프로젝트와 그 아래 모든 dataset / dataset version / build job을 함께 삭제한다. 파일시스템의 업로드/artifact도 정리.
      operationId: deleteProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "204":
          description: 삭제 완료
        "404":
          $ref: "#/components/responses/ErrorResponse"
