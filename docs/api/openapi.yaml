openapi: 3.1.0
info:
  title: Analysis Support Platform Control Plane API
  version: 0.1.0
  summary: Go control-plane API for dataset lifecycle, planning, execution, and rerun/diff
  description: |
    현재 구현 기준 control-plane API 명세다.

    주요 흐름:
    1. 프로젝트 생성
    2. dataset / dataset version 생성 또는 upload
    3. prepare / sentiment / embeddings build
    4. analysis request -> plan -> execute
    5. result / resume / rerun / diff

    `storage_uri`는 원본 dataset 위치다.
    - `versions` API를 직접 호출할 때는 호출자가 넘기는 절대 경로다.
    - `uploads` API를 쓰면 서버가 `UPLOAD_ROOT` 아래에 저장한 실제 파일 경로로 채운다.
servers:
  - url: http://127.0.0.1:18080
    description: Local development
tags:
  - name: System
  - name: Prompts
  - name: Projects
  - name: Datasets
  - name: Analysis
  - name: Executions
paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /runtime_status:
    get:
      tags: [System]
      summary: Runtime status and Temporal durability mode
      operationId: getRuntimeStatus
      responses:
        "200":
          description: Runtime status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeStatusResponse"
  /skills:
    get:
      tags: [System]
      summary: List supported skills
      operationId: listSkills
      responses:
        "200":
          description: Supported skill names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /prompts:
    get:
      tags: [Prompts]
      summary: List global prompts
      operationId: listPrompts
      parameters:
        - name: operation
          in: query
          required: false
          schema:
            type: string
            enum: [prepare, prepare_batch, sentiment, sentiment_batch]
      responses:
        "200":
          description: Global prompt list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptListResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Prompts]
      summary: Create global prompt
      operationId: createPrompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromptCreateRequest"
      responses:
        "201":
          description: Global prompt created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
  /prompts/{prompt_id}:
    get:
      tags: [Prompts]
      summary: Get global prompt
      operationId: getPrompt
      parameters:
        - name: prompt_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Global prompt detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags: [Prompts]
      summary: Update global prompt
      operationId: updatePrompt
      parameters:
        - name: prompt_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromptUpdateRequest"
      responses:
        "200":
          description: Global prompt updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Prompts]
      summary: Delete global prompt
      operationId: deletePrompt
      parameters:
        - name: prompt_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Global prompt deleted
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects:
    get:
      tags: [Projects]
      summary: List projects
      operationId: listProjects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
    post:
      tags: [Projects]
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}:
    get:
      tags: [Projects]
      summary: Get project
      operationId: getProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Projects]
      summary: Delete project
      operationId: deleteProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "204":
          description: Project deleted
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/prompts:
    get:
      tags: [Projects]
      summary: List project prompt templates
      operationId: listProjectPrompts
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project prompt list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPromptListResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Projects]
      summary: Create a project prompt template version
      operationId: saveProjectPrompt
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectPromptUpsertRequest"
            examples:
              prepare:
                summary: Prepare prompt example
                value:
                  version: project-prepare-v1
                  operation: prepare
                  content: |
                    ---
                    title: 프로젝트 전처리 v1
                    operation: prepare
                    status: experimental
                    summary: 프로젝트 전용 전처리 프롬프트
                    ---
                    아래 원문을 정제해 주세요.
                    {{raw_text}}
              prepare_batch:
                summary: Prepare batch prompt example
                value:
                  version: project-prepare-v1
                  operation: prepare_batch
                  content: |
                    ---
                    title: 프로젝트 전처리 배치 v1
                    operation: prepare_batch
                    status: experimental
                    summary: 프로젝트 전용 전처리 배치 프롬프트
                    ---
                    아래 JSON rows를 한 번에 정제해 주세요.
                    {{rows_json}}
              sentiment:
                summary: Sentiment prompt example
                value:
                  version: project-sentiment-v1
                  operation: sentiment
                  content: |
                    ---
                    title: 프로젝트 감성 분석 v1
                    operation: sentiment
                    status: active
                    summary: 프로젝트 전용 감성 분석 프롬프트
                    ---
                    아래 텍스트의 감성을 분류해 주세요.
                    {{text}}
      responses:
        "201":
          description: Project prompt saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPrompt"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/prompt_defaults:
    get:
      tags: [Projects]
      summary: Get project prompt defaults
      operationId: getProjectPromptDefaults
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project prompt default versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPromptDefaults"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [Projects]
      summary: Replace project prompt defaults
      operationId: updateProjectPromptDefaults
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectPromptDefaultsUpdateRequest"
      responses:
        "200":
          description: Updated project prompt default versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPromptDefaults"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/scenarios:
    post:
      tags: [Projects]
      summary: Register scenario
      operationId: createScenario
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioCreateRequest"
      responses:
        "201":
          description: Scenario created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Projects]
      summary: List registered scenarios
      operationId: listScenarios
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Scenario list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioListResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/scenarios/import:
    post:
      tags: [Projects]
      summary: Import scenarios from row-oriented sheet payload
      operationId: importScenarios
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioImportRequest"
      responses:
        "201":
          description: Scenarios imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioImportResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/scenarios/{scenario_id}:
    get:
      tags: [Projects]
      summary: Get registered scenario
      operationId: getScenario
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: scenario_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scenario detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/scenarios/{scenario_id}/plans:
    post:
      tags: [Projects]
      summary: Create analysis request and plan from registered scenario
      operationId: createScenarioPlan
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: scenario_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioPlanCreateRequest"
      responses:
        "201":
          description: Analysis request and plan created from scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisPlanResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/scenarios/{scenario_id}/execute:
    post:
      tags: [Projects]
      summary: Create analysis request, plan, and execution from registered scenario
      operationId: executeScenario
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: scenario_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioPlanCreateRequest"
      responses:
        "202":
          description: Analysis request, plan, and execution created from scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisExecuteResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets:
    post:
      tags: [Datasets]
      summary: Create dataset
      operationId: createDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetCreateRequest"
      responses:
        "201":
          description: Dataset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Datasets]
      summary: List datasets
      operationId: listDatasets
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Dataset list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetListResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}:
    get:
      tags: [Datasets]
      summary: Get dataset
      operationId: getDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: Dataset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Datasets]
      summary: Delete dataset
      operationId: deleteDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "204":
          description: Dataset deleted
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/active_version:
    put:
      tags: [Datasets]
      summary: Activate dataset version for a dataset
      operationId: activateDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetActiveVersionUpdateRequest"
      responses:
        "200":
          description: Dataset active version updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Datasets]
      summary: Clear active dataset version for a dataset
      operationId: deactivateDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: Dataset active version cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/uploads:
    post:
      tags: [Datasets]
      summary: Upload raw dataset file and create dataset version
      description: |
        `multipart/form-data` 업로드 endpoint다.

        주의:
        - `file` 외의 form field는 문자열로 파싱된다.
        - `metadata`는 JSON 문자열이어야 한다.
        - `prepare_required`, `sentiment_required`, `embedding_required`는 `true` 또는 `false` 문자열이어야 한다.
        - `activate_on_create`는 optional이며 `true` 또는 `false` 문자열이다. 기본값은 `true`다.
        - `prepare_llm_mode`, `sentiment_llm_mode`는 `default`, `enabled`, `disabled` 중 하나여야 한다.
      operationId: uploadDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DatasetUploadRequest"
      responses:
        "201":
          description: Uploaded file saved and dataset version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersion"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions:
    post:
      tags: [Datasets]
      summary: Create dataset version from existing storage path
      operationId: createDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetVersionCreateRequest"
      responses:
        "201":
          description: Dataset version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersion"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Datasets]
      summary: List dataset versions
      operationId: listDatasetVersions
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: Dataset version list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersionListResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}:
    get:
      tags: [Datasets]
      summary: Get dataset version
      operationId: getDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Dataset version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersion"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Datasets]
      summary: Delete dataset version
      operationId: deleteDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "204":
          description: Dataset version deleted
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/source_download:
    get:
      tags: [Datasets]
      summary: Download uploaded source file for a dataset version
      description: Uploaded local source files only. Dataset versions created from arbitrary storage_uri values cannot be downloaded through this endpoint.
      operationId: downloadDatasetSource
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Uploaded source file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/prepare_preview:
    get:
      tags: [Datasets]
      summary: Get structured prepare preview for a dataset version
      operationId: getDatasetPreparePreview
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
      responses:
        "200":
          description: Prepare preview detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetPreparePreviewResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/prepare_download:
    get:
      tags: [Datasets]
      summary: Download prepared dataset as CSV for a dataset version
      operationId: downloadPreparedDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Prepared CSV download
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/sentiment_preview:
    get:
      tags: [Datasets]
      summary: Get structured sentiment preview for a dataset version
      operationId: getDatasetSentimentPreview
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
      responses:
        "200":
          description: Sentiment preview detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetSentimentPreviewResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/sentiment_download:
    get:
      tags: [Datasets]
      summary: Download sentiment-labeled dataset as CSV for a dataset version
      operationId: downloadSentimentDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Sentiment CSV download
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/clusters/{cluster_id}/members:
    get:
      tags: [Datasets]
      summary: Get materialized members for a cluster
      operationId: getClusterMembers
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: samples_only
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Cluster membership rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetClusterMembersResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
