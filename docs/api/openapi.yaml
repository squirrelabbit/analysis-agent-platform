          description: "업로드 시 저장한 사용자 파일명. metadata.upload.original_filename → stored_filename fallback. 옛 row(직접 storage_uri로 만든 version 등)는 빈 문자열."
      required: [dataset_version_id, version_number, created_at, is_active, row_count, column_count, columns, byte_size, clean_status, doc_genuineness_status, clause_label_status]
