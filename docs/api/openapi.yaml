  /projects/{project_id}/datasets:
    post:
      tags: [Datasets]
      summary: dataset 생성
      description: |
        dataset을 생성한다. `metadata.doc_genuineness`를 body에 함께 보내면
        subject 설정이 dataset-level metadata로 저장되고, 이후
        doc_genuineness build 시 prompt 변수로 주입된다.

        생성 후 subject 설정을 바꿔야 하면
        `PATCH /projects/{project_id}/datasets/{dataset_id}/metadata`로 수정한다.
      operationId: createDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetCreateRequest"
            example:
              name: sns-data
              description: SNS sample dataset
              data_type: unstructured
              metadata:
                doc_genuineness:
                  subject_type: festival
                  subject_name: 강릉 국가유산야행
                  subject_aliases:
                    - 문화유산야행
                    - 문화재야행
                    - 강릉야행
                  recruitment_keywords:
                    - 서포터즈
                    - 푸드트럭
      responses:
        "201":
          description: dataset 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Datasets]
      summary: dataset 목록 조회
      operationId: listDatasets
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: dataset 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetListResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}:
    get:
      tags: [Datasets]
      summary: dataset 단건 조회
      operationId: getDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: dataset 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Datasets]
      summary: dataset 삭제
      description: dataset과 그 아래 모든 version / build job / artifact를 함께 삭제한다.
      operationId: deleteDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "204":
          description: 삭제 완료
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/metadata:
    patch:
      tags: [Datasets]
      summary: dataset metadata 갱신
      description: |
        dataset-level 설정(`metadata`)을 patch한다. silverone 2026-05-22
        (옵션 α1) — dataset 생성 시 `POST /projects/{pid}/datasets` body에
        `metadata.doc_genuineness`를 넣어 기본 등록하고, 이후 운영 중 subject
        설정 변경이 필요할 때 이 endpoint로 갱신한다.

        Patch 시맨틱:
        - top-level key 단위 merge. patch에 있는 key는 새 값으로 overwrite,
          patch에 없는 key는 기존 값 보존.
        - nested object(예: `doc_genuineness`)는 deep merge 하지 않고 통째로
          overwrite. 부분 수정이 필요하면 운영자가 항상 nested object 전체를
          보내야 한다.

        Request body는 `{"metadata": {...}}` 형태와 `{...}` 형태(top-level
        wrapper 생략)를 둘 다 허용한다.
      operationId: updateDatasetMetadata
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetMetadataPatchRequest"
      responses:
        "200":
          description: metadata 갱신 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/active_version:
    put:
      tags: [Datasets]
      summary: dataset의 활성 version 설정/해제
      description: |
        `dataset_version_id`가 빈 문자열이면 active version 해제, 값이 있으면
        해당 version을 활성화. 분석 endpoint(`/datasets/{did}/analyze`)는 활성
        version을 자동으로 사용한다.
      operationId: activateDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetActiveVersionUpdateRequest"
      responses:
        "200":
          description: 활성 version 갱신 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/uploads:
    post:
      tags: [Datasets]
      summary: 원본 파일 업로드 + dataset version 생성
      description: |
        multipart/form-data로 파일을 업로드하면 서버가 `UPLOAD_ROOT` 아래에
        저장하고 dataset_version row를 만든다.

        - `activate_on_create=true` (기본): 업로드된 version을 즉시 활성으로 설정
        - `metadata.text_columns`가 있으면 clean 단계가 자동 큐잉됨
      operationId: uploadDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DatasetUploadRequest"
      responses:
        "201":
          description: 업로드 완료 + version 생성
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetUploadResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions:
    get:
      tags: [Datasets]
