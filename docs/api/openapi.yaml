openapi: 3.1.0
info:
  title: Analysis Support Platform Control Plane API
  version: 0.1.0
  summary: Go control-plane API for dataset lifecycle, planning, execution, and rerun/diff
  description: |
    현재 구현 기준 control-plane API 명세다.

    주요 흐름:
    1. 프로젝트 생성
    2. dataset / dataset version 생성 또는 upload
    3. prepare / sentiment / embeddings build
    4. analysis request -> plan -> execute
    5. result / resume / rerun / diff

    `storage_uri`는 원본 dataset 위치다.
    - `versions` API를 직접 호출할 때는 호출자가 넘기는 절대 경로다.
    - `uploads` API를 쓰면 서버가 `UPLOAD_ROOT` 아래에 저장한 실제 파일 경로로 채운다.
servers:
  - url: http://127.0.0.1:18080
    description: Local development
tags:
  - name: System
  - name: Projects
  - name: Datasets
  - name: Analysis
  - name: Executions
paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /skills:
    get:
      tags: [System]
      summary: List supported skills
      operationId: listSkills
      responses:
        "200":
          description: Supported skill names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /projects:
    post:
      tags: [Projects]
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}:
    get:
      tags: [Projects]
      summary: Get project
      operationId: getProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/scenarios:
    post:
      tags: [Projects]
      summary: Register scenario
      operationId: createScenario
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioCreateRequest"
      responses:
        "201":
          description: Scenario created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Projects]
      summary: List registered scenarios
      operationId: listScenarios
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Scenario list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioListResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/scenarios/import:
    post:
      tags: [Projects]
      summary: Import scenarios from row-oriented sheet payload
      operationId: importScenarios
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioImportRequest"
      responses:
        "201":
          description: Scenarios imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioImportResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/scenarios/{scenario_id}:
    get:
      tags: [Projects]
      summary: Get registered scenario
      operationId: getScenario
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: scenario_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scenario detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/scenarios/{scenario_id}/plans:
    post:
      tags: [Projects]
      summary: Create analysis request and plan from registered scenario
      operationId: createScenarioPlan
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: scenario_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioPlanCreateRequest"
      responses:
        "201":
          description: Analysis request and plan created from scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisPlanResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/scenarios/{scenario_id}/execute:
    post:
      tags: [Projects]
      summary: Create analysis request, plan, and execution from registered scenario
      operationId: executeScenario
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: scenario_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioPlanCreateRequest"
      responses:
        "202":
          description: Analysis request, plan, and execution created from scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisExecuteResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets:
    post:
      tags: [Datasets]
      summary: Create dataset
      operationId: createDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetCreateRequest"
      responses:
        "201":
          description: Dataset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}:
    get:
      tags: [Datasets]
      summary: Get dataset
      operationId: getDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: Dataset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/uploads:
    post:
      tags: [Datasets]
      summary: Upload raw dataset file and create dataset version
      description: |
        `multipart/form-data` 업로드 endpoint다.

        주의:
        - `file` 외의 form field는 문자열로 파싱된다.
        - `metadata`는 JSON 문자열이어야 한다.
        - `prepare_required`, `sentiment_required`, `embedding_required`는 `true` 또는 `false` 문자열이어야 한다.
      operationId: uploadDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DatasetUploadRequest"
      responses:
        "201":
          description: Uploaded file saved and dataset version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersion"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions:
    post:
      tags: [Datasets]
      summary: Create dataset version from existing storage path
      operationId: createDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetVersionCreateRequest"
      responses:
        "201":
          description: Dataset version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersion"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}:
    get:
      tags: [Datasets]
      summary: Get dataset version
      operationId: getDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Dataset version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersion"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/clusters/{cluster_id}/members:
    get:
      tags: [Datasets]
      summary: Get materialized members for a cluster
      operationId: getClusterMembers
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: samples_only
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Cluster membership rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetClusterMembersResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/prepare:
    post:
      tags: [Datasets]
      summary: Build prepare artifact for dataset version
      operationId: buildPrepare
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetPrepareRequest"
      responses:
        "202":
          description: Prepare build handled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersion"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/prepare_jobs:
    post:
      tags: [Datasets]
      summary: Enqueue async prepare build job
      operationId: createPrepareJob
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetPrepareRequest"
      responses:
        "202":
          description: Prepare build job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetBuildJob"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/sentiment:
    post:
      tags: [Datasets]
      summary: Build sentiment-labeled artifact for dataset version
      operationId: buildSentiment
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetSentimentBuildRequest"
      responses:
        "202":
          description: Sentiment build handled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersion"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/sentiment_jobs:
    post:
      tags: [Datasets]
      summary: Enqueue async sentiment build job
      operationId: createSentimentJob
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetSentimentBuildRequest"
      responses:
        "202":
          description: Sentiment build job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetBuildJob"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/embeddings:
    post:
      tags: [Datasets]
      summary: Build embedding sidecar for dataset version
      operationId: buildEmbeddings
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetEmbeddingBuildRequest"
      responses:
        "202":
          description: Embedding build handled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetVersion"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/embedding_jobs:
    post:
      tags: [Datasets]
      summary: Enqueue async embedding build job
      operationId: createEmbeddingJob
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetEmbeddingBuildRequest"
      responses:
        "202":
          description: Embedding build job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetBuildJob"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/cluster_jobs:
    post:
      tags: [Datasets]
      summary: Enqueue async cluster materialization job
      operationId: createClusterJob
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetClusterBuildRequest"
      responses:
        "202":
          description: Cluster build job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetBuildJob"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/build_jobs:
    get:
      tags: [Datasets]
      summary: List dataset build jobs for a dataset version
      operationId: listDatasetBuildJobs
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Dataset build jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetBuildJobListResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/dataset_build_jobs/{job_id}:
    get:
      tags: [Datasets]
      summary: Get dataset build job
      operationId: getDatasetBuildJob
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dataset build job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetBuildJob"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /dataset_profiles/validate:
    get:
      tags: [Datasets]
      summary: Validate dataset profile registry and prompt/rule references
      operationId: validateDatasetProfiles
      responses:
        "200":
          description: Dataset profile validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetProfileValidationResponse"
  /projects/{project_id}/analysis_requests:
    post:
      tags: [Analysis]
      summary: Submit analysis request and generate plan
      operationId: submitAnalysis
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisSubmitRequest"
      responses:
        "201":
          description: Request and plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisPlanResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/analysis_requests/{request_id}:
    get:
      tags: [Analysis]
      summary: Get analysis request
      operationId: getAnalysisRequest
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Analysis request detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisRequest"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/plans/{plan_id}:
    get:
      tags: [Analysis]
      summary: Get plan record
      operationId: getPlan
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Plan detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanRecord"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/plans/{plan_id}/execute:
    post:
      tags: [Executions]
      summary: Execute plan
      operationId: executePlan
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/PlanId"
      responses:
        "202":
          description: Execution created and handed off
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanExecuteResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/executions:
    get:
      tags: [Executions]
      summary: List executions with snapshot preview
      operationId: listExecutions
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Execution list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionListResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/executions/{execution_id}:
    get:
      tags: [Executions]
      summary: Get execution
      operationId: getExecution
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ExecutionId"
      responses:
        "200":
          description: Execution detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionSummary"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/executions/{execution_id}/events:
    get:
      tags: [Executions]
      summary: Get execution event timeline
      operationId: getExecutionEvents
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ExecutionId"
      responses:
        "200":
          description: Execution event timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionEventsResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/executions/{execution_id}/progress:
    get:
      tags: [Executions]
      summary: Get execution live progress and partial preview
      operationId: getExecutionProgress
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ExecutionId"
      responses:
        "200":
          description: Execution progress detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionProgressResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/executions/{execution_id}/result:
    get:
      tags: [Executions]
      summary: Get execution result contract
      operationId: getExecutionResult
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ExecutionId"
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionResultResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/executions/{execution_id}/resume:
    post:
      tags: [Executions]
      summary: Resume waiting execution
      operationId: resumeExecution
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ExecutionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionResumeRequest"
      responses:
        "202":
          description: Resume requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionRerunResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/executions/{execution_id}/rerun:
    post:
      tags: [Executions]
      summary: Rerun execution
      operationId: rerunExecution
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ExecutionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionRerunRequest"
      responses:
        "202":
          description: Rerun requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionRerunResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/executions/diff:
    get:
      tags: [Executions]
      summary: Diff two executions
      operationId: diffExecutions
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DiffFrom"
        - $ref: "#/components/parameters/DiffTo"
      responses:
        "200":
          description: Execution diff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionDiffResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/report_drafts:
    post:
      tags: [Executions]
      summary: Create report draft from selected executions
      operationId: createReportDraft
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportDraftCreateRequest"
      responses:
        "201":
          description: Report draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportDraft"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/report_drafts/{draft_id}:
    get:
      tags: [Executions]
      summary: Get stored report draft
      operationId: getReportDraft
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: draft_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Report draft detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportDraft"
        "404":
          $ref: "#/components/responses/ErrorResponse"
