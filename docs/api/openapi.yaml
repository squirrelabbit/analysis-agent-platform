                $ref: "#/components/schemas/DatasetBuildJobAccepted"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Datasets]
      summary: clean 진행 상태 + 결과 요약 조회 (화면 polling용)
      description: |
        POST는 build job 접수만 한다. 같은 path GET이 *현재 진행 상태 +
        progress + summary*를 묶어 반환해 화면이 build job endpoint를 직접
        polling하지 않게 한다. items / pagination은 clean view에 포함하지 않고,
        결과 원본은 `/clean_download`로 받는다.
      operationId: getCleanView
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: clean artifact view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanView"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/clean_download:
    get:
      tags: [Datasets]
      summary: clean 결과 CSV 다운로드
      description: |
        clean artifact (parquet)를 DuckDB로 즉시 CSV로 변환해 UTF-8 BOM과 함께
