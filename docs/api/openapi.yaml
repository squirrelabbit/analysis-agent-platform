  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/clean:
    post:
      tags: [Datasets]
      summary: clean build job 큐잉
      description: |
        텍스트 정제(regex 룰셋 + noise pattern + 알려진 placeholder strip) build
        job을 큐에 넣는다. 응답은 `DatasetBuildJobAccepted` (job_id 등 4 필드).
        진행 상태는 `GET /dataset_build_jobs/{job_id}` 또는 `GET /versions/{vid}`
        로 polling.
      operationId: createCleanJob
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
