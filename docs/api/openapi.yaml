      tags: [Datasets]
      summary: dataset version 상세 조회
      description: clean / doc_genuineness / clause_label 각 단계의 status, 완료 시각, 요약(summary)을 묶어서 반환. 단계별 결과 페이지는 `/versions/{vid}/doc_genuineness` 등 별도 endpoint로.
      operationId: getDatasetVersion
