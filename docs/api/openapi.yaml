  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/doc_genuineness:
    post:
      tags: [Datasets]
      summary: doc_genuineness build job 큐잉
      description: |
        cleaned doc 단위로 LLOA에 한 호출씩 보내 `genuine_review` / `mixed` /
        `non_review` 3-tier 라벨을 부여한다. clean이 ready 상태여야 호출 가능.
        후속 `clause_label`에서 `include_genuineness=["genuine_review","mixed"]`
        옵션을 쓰면 후기성 doc만 절 분리/감성·aspect 라벨링 단계로 흘려보낸다.
      operationId: createDocGenuinenessJob
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetDocGenuinenessBuildRequest"
      responses:
        "202":
          description: doc_genuineness build job 큐잉 완료 (slim shape)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetBuildJobAccepted"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Datasets]
      summary: doc_genuineness 진행 상태 + 결과 조회 (화면 polling용)
      description: |
        POST가 build job 접수만 한다면, 같은 path GET은 *현재 진행 상태 +
        통계 + 페이지된 items*를 반환한다. 화면이 1~2초 간격으로 polling하다가
        `status="completed"`가 되면 summary/items를 렌더링하는 용도.

        artifact는 DuckDB on-demand 집계. 큰 dataset(1만+ row)에서 성능 이슈가
        생기면 build 완료 시 metadata에 summary를 캐시하는 방향으로 확장 예정.
      operationId: getDocGenuinenessView
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
        - $ref: "#/components/parameters/ArtifactLimit"
        - $ref: "#/components/parameters/ArtifactOffset"
      responses:
        "200":
          description: doc_genuineness artifact view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocGenuinenessView"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/doc_genuineness_download:
    get:
      tags: [Datasets]
      summary: doc_genuineness 결과 CSV 다운로드
      description: |
        doc_genuineness artifact (jsonl)를 DuckDB로 즉시 CSV로 변환해 UTF-8 BOM
        과 함께 스트림. clean_download / clause_label_download와 동일 패턴.

        silverone 2026-06-01 (다운로드 컬럼 확장) — cleaned.parquet과 doc_id
        기준 LEFT JOIN해 본문/원본 추적 컬럼을 함께 포함한다.

        컬럼 순서 (CSV header 고정):
        `doc_id, genuineness, reason, prompt_version, source,
        cleaned_text, raw_text, created_at, source_row_index`

        clean artifact가 없거나 join miss인 doc은 cleaned_text / raw_text /
        created_at / source_row_index가 빈 값으로 표시되고 row 자체는 유지된다.
        jsonl에 저장되지 않는 model / taxonomy / subject_name은 포함하지 않는다.
      operationId: downloadDocGenuinenessDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: CSV (UTF-8 BOM) 스트림
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/clause_label:
    post:
      tags: [Datasets]
      summary: clause_label build job 큐잉
      description: |
        cleaned doc 단위로 LLOA에 한 호출씩 보내 절 분리 + sentiment + aspect를
        한 번에 라벨링한다. clean이 ready 상태여야 호출 가능. 옵션
        `include_genuineness=["genuine_review","mixed"]` 명시 시 doc_genuineness
        도 ready여야 한다 (후기성 doc만 통과).
      operationId: createClauseLabelJob
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetClauseLabelBuildRequest"
      responses:
        "202":
          description: clause_label build job 큐잉 완료 (slim shape)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetBuildJobAccepted"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Datasets]
      summary: clause_label 진행 상태 + 결과 조회 (화면 polling용)
      description: |
        POST가 build job 접수만 한다면, 같은 path GET은 *현재 진행 상태 +
        sentiment / aspect 통계 + 페이지된 clauses*를 반환한다. `clause_id`는
        artifact에 저장돼 있지 않아 `{doc_id}-{partition_row_index}` (0-base)
        형식으로 서버가 즉시 생성. 같은 artifact 재조회 시 같은 clause_id가
        나온다.
      operationId: getClauseLabelView
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
        - $ref: "#/components/parameters/ArtifactLimit"
        - $ref: "#/components/parameters/ArtifactOffset"
      responses:
        "200":
          description: clause_label artifact view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClauseLabelView"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/clause_label_download:
    get:
      tags: [Datasets]
      summary: clause_label 결과 CSV 다운로드
      description: |
        clause_label artifact (jsonl)를 DuckDB로 즉시 CSV로 변환해 UTF-8 BOM과
        함께 스트림. clean_download / doc_genuineness_download와 동일 패턴.

        silverone 2026-06-01 (다운로드 컬럼 확장) — cleaned.parquet 본문 +
        doc_genuineness.jsonl genuineness를 doc_id 기준 LEFT JOIN해 함께 포함.

        컬럼 순서 (CSV header 고정):
        `doc_id, clause_id, clause_text, aspect, sentiment,
        prompt_version, source,
        cleaned_text, raw_text, created_at, source_row_index, genuineness`

        clean 또는 doc_genuineness artifact가 없거나 join miss인 row는 해당
        컬럼이 빈 값으로 표시되고 clause row 자체는 유지된다. jsonl에 저장되지
        않는 aspect_reason / sentiment_reason / taxonomy_* 필드는 포함하지 않는다.
      operationId: downloadClauseLabelDataset
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: clause_label CSV download (UTF-8 BOM)
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/analyze:
    post:
      tags: [Analysis]
      summary: 분석 실행 (첫 turn shortcut, user_question만 받음)
      description: |
        analysis API의 중심은 이 endpoint가 아니라 `analysis_thread` +
        `analysis_message` + `analysis_run` 3 객체다. 이 endpoint는
        **첫 turn shortcut** — (create thread + first user message + start run)
        한 흐름으로 묶어 호출한다.

        흐름:
        - active dataset version 1회 resolve → `thread.dataset_version_id`에 고정.
          이후 같은 thread의 messages/runs는 active version을 다시 resolve하지 않고
          잠긴 version을 그대로 쓴다.
        - user message 저장 → `analysis_run` 생성 → sync 분석 실행 → assistant
          message 저장 → run completed/failed 업데이트.

        요청 body: `{user_question: "..."}` 1 필드. planner LLM이 자연어 질의를
        받아 plan을 생성하고 executor가 결정론적으로 실행한다. plan을 직접
        던지는 debug/replay는 `POST /versions/{vid}/analyze`.

        실패 시: `analysis_run.status=failed`로 업데이트되고 assistant placeholder
        message (`"분석 실행 중 오류가 발생했습니다…"`)가 thread에 저장된다.
        응답은 HTTP error (4xx/5xx). thread reload 시 user/assistant 한 쌍이
        보인다.

        **answer composition** (ADR-020 PR-A): 성공 run은 sync 실행 직후
        post-execution layer (deterministic composer)가 `assistant_content` /
        `display` / `context_summary`를 생성해 `result.composer`로 노출한다.
        `assistant_message.content`/`context_summary`는 이 값을 우선 저장한다.

        이어질문은 `POST /analysis_threads/{thread_id}/messages`.

        active version이 없으면 400.
      operationId: analyzeDatasetActive
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeUserQuestionRequest"
      responses:
        "200":
          description: 저장된 analysis thread 첫 메시지 + 분석 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisThreadMessageResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/analysis_threads:
    post:
      tags: [Analysis]
      summary: analysis thread 생성
      description: |
        새 분석 채팅 thread를 만든다. **`thread.dataset_version_id`는 생성 시점의
        active version으로 고정**되고, 이후 같은 thread의 모든 message/run이 이
        version을 사용한다 (dataset의 active version이 바뀌어도 thread는 영향
        없음). 새 version으로 분석하려면 새 thread를 만든다.

        일반적으로는 `POST /datasets/{did}/analyze` shortcut으로 thread 생성과 첫
        분석 실행을 함께 처리하고, 이 endpoint는 빈 thread를 미리 만들거나
        title만 지정하는 흐름에서 사용한다.
      operationId: createAnalysisThread
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisThreadCreateRequest"
      responses:
        "201":
          description: analysis thread 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisThread"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Analysis]
      summary: analysis thread 목록 조회
      description: result_json 없이 가벼운 thread 목록(last_message, message_count)을 반환한다.
      operationId: listAnalysisThreads
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          description: analysis thread 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisThreadListResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/analysis_threads/{thread_id}:
    get:
      tags: [Analysis]
      summary: analysis thread 상세 조회
      description: thread metadata와 messages를 반환한다. run의 full result_json은 `/analysis_runs/{run_id}`로 조회한다.
      operationId: getAnalysisThread
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/ThreadId"
      responses:
        "200":
          description: analysis thread 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisThreadDetail"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Analysis]
      summary: analysis thread 단건 삭제
      description: |
        thread를 삭제한다 (silverone 2026-06-01). 해당 project_id + dataset_id에
        속한 thread만 삭제 가능 — dataset이 다르거나 thread가 없으면 404.
        analysis_messages / analysis_runs / planner_rejection_events는 FK
        ON DELETE CASCADE로 함께 삭제된다. bulk/soft delete/restore는 미지원.
      operationId: deleteAnalysisThread
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/ThreadId"
      responses:
        "204":
          description: 삭제 완료 (본문 없음)
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/analysis_threads/{thread_id}/messages:
    post:
      tags: [Analysis]
      summary: analysis thread 이어질문 실행
      description: |
        기존 thread에 user message를 추가하고 thread에 잠긴 `dataset_version_id`
        그대로 분석을 실행한다 (dataset의 현재 active version을 재resolve하지
        않음).

        흐름:
        - user message 저장 → `analysis_run` 생성 → sync 분석 실행 → assistant
          message 저장 → run completed/failed 업데이트.
        - **plan reuse** — `add_limit`, `change_present_format` 같은 단순
          follow-up이면 rule-based classifier가 이전 successful run의 plan을
          patch해 planner LLM을 건너뛴다. classifier no_match / patch fail /
          validator fail / executor fail이면 모두 planner LLM 흐름으로 fallback.
          결과에 `result.reuse` metadata가 inject된다 (성공/실패 모두).
        - **conversation context** — 최근 assistant `context_summary` 최대 3턴,
          누적 직렬화 2000 bytes 한도로 worker payload에 주입. full result_json은
          넘기지 않는다. failed run placeholder는 `context_summary`가 비어 있어
          자동으로 다음 turn 입력에서 제외된다.
        - **answer composition** (ADR-020 PR-A) — sync 실행 직후 deterministic
          composer가 `result.composer`를 만든다. reuse 분기에서도 composer가
          `reuse_applied` 템플릿으로 답변을 생성. `assistant_message.content`/
          `context_summary`는 composer 결과를 우선 사용한다.

        실패 시: `analysis_run.status=failed`로 업데이트되고 assistant placeholder
        message가 thread에 저장된다 (응답은 HTTP error).
      operationId: postAnalysisThreadMessage
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/ThreadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisThreadMessageRequest"
      responses:
        "200":
          description: 저장된 메시지 + 분석 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisThreadMessageResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/analysis_runs/{run_id}:
    get:
      tags: [Analysis]
      summary: analysis run 상세 조회
      description: 저장된 분석 실행의 request_json/result_json을 조회한다.
      operationId: getAnalysisRun
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: analysis run 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisRun"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/versions/{version_id}/analyze:
    post:
      tags: [Analysis]
      summary: plan 디버깅용 분석 실행 (version 고정, plan만 받음)
      description: |
        version-specific **debug/replay** 경로. `analysis_thread` /
        `analysis_message` / `analysis_run`을 저장하지 않는 stateless 실행.
        plan_v2 JSON을 직접 던져 LLM 호출 없이 validator → executor만 돌린다.
        어제 LLM이 만든 plan을 그대로 다시 돌려 결과를 재현하거나, 운영자가
        plan을 손으로 작성해 step별 동작을 확인할 때 사용.

        요청 body: `{plan: {...}}` 1 필드 (user_question은 받지 않음).
        응답: thread/message wrapper가 없는 단순 analyze result shape.

        화면 분석(자연어 질의)은 `POST /datasets/{did}/analyze` (첫 turn) +
        `POST /analysis_threads/{tid}/messages` (이어질문)를 사용한다.
      operationId: analyzeDatasetVersion
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeDebugRequest"
      responses:
        "200":
          description: plan 실행 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /projects/{project_id}/dataset_build_jobs/{job_id}:
    get:
      tags: [Datasets]
      summary: build job 단건 상세 조회 (debug/audit 전용, 화면 polling 비권장)
      description: |
        debug / audit 용도 endpoint. **화면 polling에 사용하지 않는다** —
        화면은 `GET /versions/{vid}/{단계}` view를 polling한다.

        Phase 3 (2026-05-22) 정리:
        - `/versions/{vid}/build_jobs` (list)는 제거됐다
        - 본 endpoint는 운영자가 특정 job의 attempt / workflow_id /
          workflow_run_id / Temporal 이력을 추적할 때만 사용
        - 인증/권한 체계 도입 시 internal/admin 라우트로 격리 예정

        화면이 build job 진행을 확인하려면:
        `POST /versions/{vid}/clean` → `GET /versions/{vid}/clean` polling.
      operationId: getDatasetBuildJob
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: POST 응답의 `job_id`
      responses:
        "200":
          description: build job 상세 (디버그 / 감사용)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetBuildJob"
        "404":
          $ref: "#/components/responses/ErrorResponse"
components:
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
    DatasetId:
      name: dataset_id
      in: path
      required: true
      schema:
        type: string
    VersionId:
      name: version_id
      in: path
      required: true
      schema:
        type: string
    ThreadId:
      name: thread_id
      in: path
      required: true
      schema:
        type: string
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
    ArtifactLimit:
      name: limit
      in: query
      required: false
      description: 페이지당 items 수. 기본 100, 최대 1000.
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
    ArtifactOffset:
      name: offset
      in: query
      required: false
      description: items 시작 offset (0-base).
      schema:
        type: integer
        minimum: 0
        default: 0
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        stack:
          type: string
          example: go-control-plane-scaffold
      required: [status, stack]
    RuntimeStatusTemporal:
      type: object
      properties:
        address:
          type: string
        namespace:
          type: string
        task_queue:
          type: string
        build_task_queue:
          type: string
        persistence_mode:
          type: string
        retention_mode:
          type: string
        recovery_mode:
          type: string
    RuntimeStatusResponse:
      type: object
      properties:
        status:
          type: string
        stack:
          type: string
        workflow_engine:
          type: string
        store_backend:
          type: string
        planner_backend:
          type: string
        temporal:
          anyOf:
            - $ref: "#/components/schemas/RuntimeStatusTemporal"
            - type: "null"
      required: [status, stack]
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
      required: [detail]
    PromptOptionVersion:
      type: object
      properties:
        version:
          type: string
          description: md 파일 stem (예 v1, v3).
        label:
          type: string
          description: md 본문 첫 H1. H1이 없으면 version과 동일.
      required: [version, label]
    PromptOptionsResponse:
      type: object
      description: GET /prompt_options 응답. prompt 본문/파일 경로는 포함하지 않는다.
      properties:
        task:
          type: string
          description: prompt task 폴더명.
        default:
          type: string
          description: index.yaml의 default version (versions 중 하나).
        versions:
          type: array
          items:
            $ref: "#/components/schemas/PromptOptionVersion"
      required: [task, default, versions]
    TaxonomyAspect:
      type: object
      description: 단일 aspect 정의. key는 artifact에 저장되는 영문 식별자, label은 표시용 한글.
      properties:
        key:
          type: string
          description: aspect 영문 식별자 (clause artifact의 aspect 값).
          example: food
        label:
          type: string
          description: 표시용 한글 라벨.
          example: 음식
        description:
          type: string
          description: aspect 판정 기준 설명.
      required: [key, label, description]
    TaxonomyResponse:
      type: object
      description: GET /taxonomy 응답. aspect/sentiment taxonomy 정의.
      properties:
        taxonomy_id:
          type: string
          description: taxonomy 식별자.
          example: festival-v2
        domain:
          type: string
          description: taxonomy 도메인.
          example: festival
        aspects:
          type: array
          description: aspect 정의 목록 (config 정의 순서 유지).
          items:
            $ref: "#/components/schemas/TaxonomyAspect"
        sentiments:
          type: array
          description: 허용 sentiment enum.
          items:
            type: string
          example: [positive, negative, neutral]
        fallback_aspect:
          type: string
          description: 분류 실패 시 사용하는 fallback aspect key (aspects 중 하나).
          example: etc
        taxonomy_hash:
          type: string
          description: taxonomy 내용 기반 sha256 hash (변경 감지용).
      required: [taxonomy_id, domain, aspects, sentiments, fallback_aspect, taxonomy_hash]
    StringList:
      type: array
      items:
        type: string
    AnyMap:
      type: object
      additionalProperties: true
    StringMap:
      type: object
      additionalProperties:
        type: string
    IntegerMap:
      type: object
      additionalProperties:
        type: integer
    Project:
      type: object
      properties:
        project_id:
          type: string
        name:
          type: string
        description:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        dataset_count:
          type: integer
        dataset_version_count:
          type: integer
        scenario_count:
          type: integer
        prompt_count:
          type: integer
        analysis_thread_count:
          type: integer
          description: |
            project 단위 analysis thread 합산 count (silverone 2026-06-01).
            사이드바 채팅 count 표시용. dataset 단위 thread API
            (`GET /projects/{pid}/datasets/{did}/analysis_threads`)는 그대로 유지.
            프론트가 dataset별 N+1 호출 안 하도록 server-side 단일 COUNT 합산.
            thread 0건이면 0.
      required: [project_id, name, created_at, dataset_count, dataset_version_count, scenario_count, prompt_count, analysis_thread_count]
    ProjectCreateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type:
            - string
            - "null"
      required: [name]
    ProjectListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"
      required: [items]
    ProjectPrompt:
      type: object
      properties:
        project_id:
          type: string
        version:
          type: string
        operation:
          type: string
        title:
          type: string
        status:
          type: string
        summary:
          type: string
        content:
          type: string
        content_hash:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [project_id, version, operation, title, status, content, content_hash, created_at, updated_at]
    ProjectPromptUpsertRequest:
      type: object
      description: |
        프로젝트 prompt는 `version`, `operation`, `content` 3개 필드로 등록한다.

        - 같은 `version + operation` 조합은 다시 등록할 수 없다.
        - `content`는 Markdown prompt 본문이며, front matter를 포함할 수 있다.
        - operation별 필수 placeholder:
          - `prepare`: `{{raw_text}}`
          - `prepare_batch`: `{{rows_json}}`
          - `sentiment`: `{{text}}`
          - `sentiment_batch`: `{{rows_json}}`
      properties:
        version:
          type: string
          description: |
            프로젝트 내부에서 사용할 prompt version 이름.
            row/batch prompt를 한 세트로 운영하려면 같은 version을 공유하고 operation만 다르게 등록한다.
        operation:
          type: string
          enum: [prepare, prepare_batch, sentiment, sentiment_batch]
          description: Prompt가 적용될 build 단계와 템플릿 슬롯.
        content:
          type: string
          description: |
            Markdown prompt 내용. front matter의 `title`, `operation`, `status`, `summary`를 읽어 metadata로 저장한다.
      required: [version, operation, content]
    ProjectPromptListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectPrompt"
      required: [items]
    ProjectPromptChange:
      type: object
      description: |
        ADR-015 §C audit log 1행. ``project_prompt_changes`` 테이블의
        append-only row 모양. 운영자가 prompt 변경마다 ``change_reason``
        의무, revert는 새 version + ``base_version`` 기록.
      properties:
        change_id:
          type: string
        project_id:
          type: string
        version:
          type: string
        operation:
          type: string
        action:
          type: string
          description: "create / update / revert"
          enum: [create, update, revert]
        change_reason:
          type: string
        changed_by:
          type: string
          description: 빈 문자열은 auth 도입 전 placeholder.
        previous_content_hash:
          type: string
        new_content_hash:
          type: string
        base_version:
          type: string
          description: "action=revert인 경우만 채워짐 (clone 원본 version)."
        changed_at:
          type: string
          format: date-time
      required: [change_id, project_id, version, operation, action, change_reason, new_content_hash, changed_at]
    ProjectPromptHistoryResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectPromptChange"
      required: [items]
    ProjectPromptRevertRequest:
      type: object
      description: |
        ADR-015 §C: revert는 활성 row를 in-place 수정하지 않고, ``to_version``
        본문을 ``new_version`` 이름으로 *새 행*에 clone + audit 행 append.
      properties:
        to_version:
          type: string
          description: 본문을 가져올 기존 version 이름.
        new_version:
          type: string
          description: clone 결과를 저장할 새 version 이름.
        change_reason:
          type: string
          description: 의무. 비우면 HTTP 400.
      required: [to_version, new_version, change_reason]
    ProjectPromptDiffStats:
      type: object
      properties:
        added_lines:
          type: integer
        removed_lines:
          type: integer
        base_lines:
          type: integer
        head_lines:
          type: integer
      required: [added_lines, removed_lines, base_lines, head_lines]
    ProjectPromptDiffResponse:
      type: object
      properties:
        project_id:
          type: string
        operation:
          type: string
        base_version:
          type: string
        head_version:
          type: string
        base_content:
          type: string
        head_content:
          type: string
        unified_diff:
          type: string
          description: GNU unified diff 형식 (``--- base`` / ``+++ head`` 헤더 포함).
        stats:
          $ref: "#/components/schemas/ProjectPromptDiffStats"
      required: [project_id, operation, base_version, head_version, base_content, head_content, unified_diff, stats]
    ProjectPromptDefaults:
      type: object
      properties:
        project_id:
          type: string
        prepare_prompt_version:
          type:
            - string
            - "null"
        sentiment_prompt_version:
          type:
            - string
            - "null"
        planner_prompt_version:
          type:
            - string
            - "null"
        planner_meta_prompt_version:
          type:
            - string
            - "null"
        issue_evidence_summary_prompt_version:
          type:
            - string
            - "null"
        execution_final_answer_prompt_version:
          type:
            - string
            - "null"
        updated_at:
          type:
            - string
            - "null"
          format: date-time
      required: [project_id]
    ProjectPromptDefaultsUpdateRequest:
      type: object
      description: |
        프로젝트 기본 prompt version을 교체한다 (ADR-015 Phase A5, 6 operation).

        - dataset version이 `prepare_prompt_version`, `sentiment_prompt_version`을 직접 지정하면 그 값이 우선한다.
        - 직접 지정하지 않은 경우 여기서 설정한 project 기본값이 fallback으로 사용된다.
        - planner / planner_meta / issue_evidence_summary / execution_final_answer는 dataset version 단위가 아닌 분석 실행 단위로 적용된다 (ADR-015 §B의 4-tier resolution).
      properties:
        prepare_prompt_version:
          type:
            - string
            - "null"
          description: |
            프로젝트 기본 prepare prompt version. 해제하려면 `null`.
        sentiment_prompt_version:
          type:
            - string
            - "null"
          description: |
            프로젝트 기본 sentiment prompt version. 해제하려면 `null`.
        planner_prompt_version:
          type:
            - string
            - "null"
          description: |
            프로젝트 기본 planner prompt version (ADR-015 §D2 — 분석가는 preset 선택만, 운영자만 편집).
        planner_meta_prompt_version:
          type:
            - string
            - "null"
          description: |
            프로젝트 기본 planner_meta prompt version (operator_only).
        issue_evidence_summary_prompt_version:
          type:
            - string
            - "null"
          description: |
            프로젝트 기본 issue_evidence_summary prompt version.
        execution_final_answer_prompt_version:
          type:
            - string
            - "null"
          description: |
            프로젝트 기본 execution_final_answer prompt version.
    Dataset:
      type: object
      properties:
        dataset_id:
          type: string
        project_id:
          type: string
        name:
          type: string
        description:
          type:
            - string
            - "null"
        data_type:
          type: string
        active_dataset_version_id:
          type:
            - string
            - "null"
        active_version_updated_at:
          type:
            - string
            - "null"
          format: date-time
        metadata:
          type: object
          additionalProperties: true
          description: |
            dataset-level 설정 jsonb. silverone 2026-05-22 (옵션 α1).
            현재 정의된 keypath:
              - `metadata.doc_genuineness` — {subject_type, subject_name,
                subject_aliases[], recruitment_keywords[]} (값 채워지면
                doc_genuineness build 시 prompt placeholder로 inject 예정).
            그 외 key는 forward-compat용으로 그대로 보존된다.
        created_at:
          type: string
          format: date-time
      required: [dataset_id, project_id, name, data_type, created_at]
    DatasetCreateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type:
            - string
            - "null"
        data_type:
          type:
            - string
            - "null"
        metadata:
          type: object
          additionalProperties: true
          description: |
            dataset 생성 시 함께 저장할 dataset-level 설정. doc_genuineness
            subject는 기본적으로 여기서 등록한다. 이후 수정은
            `PATCH /projects/{pid}/datasets/{did}/metadata`를 사용한다.
            키 정의는 `Dataset.metadata` 참고. 생략하면 빈 object로 저장.
          example:
            doc_genuineness:
              subject_type: festival
              subject_name: 강릉 국가유산야행
              subject_aliases:
                - 문화유산야행
                - 문화재야행
                - 강릉야행
              recruitment_keywords:
                - 서포터즈
                - 푸드트럭
