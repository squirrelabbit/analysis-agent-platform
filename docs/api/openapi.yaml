          description: 데이터 행 수. 형식을 분석할 수 없으면 0.
        column_count:
          type: integer
          description: 컬럼 수. 형식을 분석할 수 없으면 0.
        columns:
          type: array
          description: 컬럼 이름 목록.
          items:
            type: string
        byte_size:
          type: integer
          format: int64
          description: 저장된 원본 파일 바이트 크기.
      required: [dataset_version_id, row_count, column_count, columns, byte_size]
    DatasetCleanRequest:
      type: object
      description: |
        2026-05-21 — output_path / force / preprocess_options 3 필드 제거.
        text_columns는 upload 시 metadata에 저장되면 생략 가능.

        silverone 2026-05-28 (clean 정식화) — date_column optional 추가. 명시되면
        해당 source 컬럼을 ISO 8601 UTC string `created_at`으로 변환해 cleaned.parquet
        에 노출. 원본 row 전체는 `source_json` 컬럼(JSON string)에 보존되어 운영자가
        한글/괄호 source 컬럼 값을 확인할 수 있음. 표준 9 컬럼 schema:
        `row_id` / `doc_id` / `source_row_index` / `raw_text` / `cleaned_text` /
        `created_at` / `clean_status` / `clean_reason` / `source_json`.
      properties:
        text_columns:
          type: array
          items:
            type: string
          minItems: 1
          description: clean 대상 원본 텍스트 컬럼 목록. 단일 컬럼도 배열 하나로 전달한다. upload metadata에 text_columns가 있으면 생략 가능.
        date_column:
          type:
            - string
            - "null"
          description: |
            cleaned.parquet에 `created_at` ISO 8601 UTC string으로 변환할 source date 컬럼명.
            예시 `"게시일"`. 명시 안 하면 `created_at` 컬럼은 모두 null. parse 실패 / Invalid date /
            빈 값은 row별 null로 처리 (전체 row는 유지). 분리형 date(`pub_year` / `month` / `day`)
            지원은 후속 PR (`date_parts`).
    AnalysisThread:
