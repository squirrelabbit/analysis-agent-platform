components:
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
    DatasetId:
      name: dataset_id
      in: path
      required: true
      schema:
        type: string
    VersionId:
      name: version_id
      in: path
      required: true
      schema:
        type: string
    RequestId:
      name: request_id
      in: path
      required: true
      schema:
        type: string
    PlanId:
      name: plan_id
      in: path
      required: true
      schema:
        type: string
    ExecutionId:
      name: execution_id
      in: path
      required: true
      schema:
        type: string
    DiffFrom:
      name: from
      in: query
      required: true
      schema:
        type: string
    DiffTo:
      name: to
      in: query
      required: true
      schema:
        type: string
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        stack:
          type: string
          example: go-control-plane-scaffold
      required: [status, stack]
    RuntimeStatusTemporal:
      type: object
      properties:
        address:
          type: string
        namespace:
          type: string
        task_queue:
          type: string
        build_task_queue:
          type: string
        persistence_mode:
          type: string
        retention_mode:
          type: string
        recovery_mode:
          type: string
    RuntimeStatusResponse:
      type: object
      properties:
        status:
          type: string
        stack:
          type: string
        workflow_engine:
          type: string
        store_backend:
          type: string
        planner_backend:
          type: string
        temporal:
          anyOf:
            - $ref: "#/components/schemas/RuntimeStatusTemporal"
            - type: "null"
      required: [status, stack]
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
      required: [detail]
    StringList:
      type: array
      items:
        type: string
    AnyMap:
      type: object
      additionalProperties: true
    StringMap:
      type: object
      additionalProperties:
        type: string
    IntegerMap:
      type: object
      additionalProperties:
        type: integer
    Project:
      type: object
      properties:
        project_id:
          type: string
        name:
          type: string
        description:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        dataset_version_count:
          type: integer
        scenario_count:
          type: integer
        prompt_count:
          type: integer
      required: [project_id, name, created_at, dataset_version_count, scenario_count, prompt_count]
    ProjectCreateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type:
            - string
            - "null"
      required: [name]
    ProjectListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"
      required: [items]
    ProjectPrompt:
      type: object
      properties:
        project_id:
          type: string
        version:
          type: string
        operation:
          type: string
        title:
          type: string
        status:
          type: string
        summary:
          type: string
        content:
          type: string
        content_hash:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [project_id, version, operation, title, status, content, content_hash, created_at, updated_at]
    ProjectPromptUpsertRequest:
      type: object
      description: |
        프로젝트 prompt는 `version`, `operation`, `content` 3개 필드로 등록한다.

        - 같은 `version + operation` 조합은 다시 등록할 수 없다.
        - `content`는 Markdown prompt 본문이며, front matter를 포함할 수 있다.
        - operation별 필수 placeholder:
          - `prepare`: `{{raw_text}}`
          - `prepare_batch`: `{{rows_json}}`
          - `sentiment`: `{{text}}`
          - `sentiment_batch`: `{{rows_json}}`
      properties:
        version:
          type: string
          description: |
            프로젝트 내부에서 사용할 prompt version 이름.
            row/batch prompt를 한 세트로 운영하려면 같은 version을 공유하고 operation만 다르게 등록한다.
        operation:
          type: string
          enum: [prepare, prepare_batch, sentiment, sentiment_batch]
          description: Prompt가 적용될 build 단계와 템플릿 슬롯.
        content:
          type: string
          description: |
            Markdown prompt 내용. front matter의 `title`, `operation`, `status`, `summary`를 읽어 metadata로 저장한다.
      required: [version, operation, content]
    ProjectPromptListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectPrompt"
      required: [items]
    Prompt:
      type: object
      properties:
        prompt_id:
          type: string
        version:
          type: string
        operation:
          type: string
        title:
          type: string
        status:
          type: string
        summary:
          type: string
        content:
          type: string
        content_hash:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [prompt_id, version, operation, title, status, content, content_hash, created_at, updated_at]
    PromptCreateRequest:
      type: object
      description: |
        글로벌 prompt는 `version`, `operation`, `content` 3개 필드로 등록한다.

        - 같은 `version + operation` 조합은 다시 등록할 수 없다.
        - operation별 필수 placeholder:
          - `prepare`: `{{raw_text}}`
          - `prepare_batch`: `{{rows_json}}`
          - `sentiment`: `{{text}}`
          - `sentiment_batch`: `{{rows_json}}`
      properties:
        version:
          type: string
        operation:
          type: string
          enum: [prepare, prepare_batch, sentiment, sentiment_batch]
        content:
          type: string
      required: [version, operation, content]
    PromptUpdateRequest:
      type: object
      description: |
        글로벌 prompt를 부분 수정한다.

        - `version`, `operation`, `content` 중 하나 이상을 보내야 한다.
        - `content`를 바꾸면 front matter 기준으로 `title`, `status`, `summary`도 함께 다시 계산된다.
      properties:
        version:
          type:
            - string
            - "null"
        operation:
          type:
            - string
            - "null"
          enum: [prepare, prepare_batch, sentiment, sentiment_batch, null]
