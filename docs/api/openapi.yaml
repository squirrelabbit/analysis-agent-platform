    DatasetUploadRequest:
      type: object
      description: "ADR-018 β2 (2026-05-20) — record_count / metadata / prepare/sentiment/embedding 관련 9 form field 제거. file + data_type + activate_on_create만 받음. text_columns 등 clean 옵션은 후속 POST /clean에서 명시."
