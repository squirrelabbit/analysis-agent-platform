      required: [thread_id, project_id, dataset_id, dataset_version_id, created_at, updated_at]
    AnalysisThreadCreateRequest:
      type: object
      properties:
        title:
          type: string
    AnalysisThreadListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisThread"
      required: [items]
    AnalysisMessage:
      type: object
      properties:
        message_id:
          type: string
        thread_id:
          type: string
        project_id:
          type: string
        dataset_id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          description: |
            user 발언 원문 또는 assistant 응답. assistant message는 두 종류로
            저장된다. (1) 성공 run의 답변 본문 — ADR-020 PR-A composer가 만든
            `result.composer.assistant_content`가 우선 저장. (2) failed run
            placeholder (`"분석 실행 중 오류가 발생했습니다…"` 글로벌 한국어 한 문장).
            placeholder는 error 상세를 노출하지 않고 사용자용 일반 문구만 담는다.
            error 원문은 `analysis_run.error_message`로 조회한다.
        context_summary:
          type: object
          additionalProperties: true
          description: |
            다음 이어질문 planner에 넣는 짧은 구조화 요약. full result_json은
            포함하지 않는다. ADR-020 PR-A composer가 만든
            `result.composer.context_summary`가 우선 저장된다 (`question`은
            caller가 user_question으로 덮어쓴다). 사용자에게 직접 노출하지
            않으며 다음 turn의 `conversation_context` 생성에 사용된다.
            failed run placeholder의 경우 비어있어 다음 turn conversation_context
            에서 자동 제외된다.
        run_id:
          type:
            - string
            - "null"
          description: |
            assistant message만 보유. 성공/실패 모두 자기 run을 가리킨다.
            failed run에서도 placeholder message가 run_id로 실패 run에 연결되어
            화면에서 재시도/이력 조회가 가능하다.
        created_at:
          type: string
          format: date-time
        display:
          allOf:
            - $ref: "#/components/schemas/ComposerDisplay"
          description: |
            assistant message display projection for history rendering
            (silverone 2026-06-01).

            GET `/projects/{pid}/datasets/{did}/analysis_threads/{tid}` thread
            detail 응답에서 assistant message가 연결된 `run.result_json` 안에
            `composer.display`가 있으면 lightweight projection으로 채워진다.
            keep set은 `ComposerDisplay`의 `type` / `title` / `columns` /
            `rows` / `total_rows` / `returned_rows` / `max_rows` / `truncated`
            / `warnings` / `recommended_view` / `chart_spec` 11 키 — POST 응답의
            `result.composer.display`와 schema 동일.

            POST `/datasets/{did}/analyze` / `POST /analysis_threads/{tid}/messages`
            응답에는 포함되지 않는다 (그 응답은 `result.composer.display`로 받음).
            user message에는 항상 없음. run_id가 없거나 result_json에 display가
            없으면 omit (null로 보내지 않음).
        plan:
          allOf:
            - $ref: "#/components/schemas/AnalyzePlanView"
          description: |
            assistant message plan projection for history rendering
            (silverone 2026-06-01).

            GET `/projects/{pid}/datasets/{did}/analysis_threads/{tid}` thread
            detail 응답에서 assistant message가 연결된 `run.result_json` 안에
            `plan`이 있으면 POST 응답의 `result.plan`과 동일 keep-set
            (`plan_version` + `steps[].id` / `.skill` / `.params`)으로 채워진다.

            POST `/datasets/{did}/analyze` / `POST /analysis_threads/{tid}/messages`
            응답에는 포함되지 않는다 (그 응답은 `result.plan`으로 받음).
            user message에는 항상 없음. run_id가 없거나 result_json에 plan이
            없으면 omit (null로 보내지 않음). step status / duration_ms /
            row_count 같은 추가 메타는 후속 PR.
      required: [message_id, thread_id, project_id, dataset_id, role, content, created_at]
    AnalysisThreadDetail:
      allOf:
        - $ref: "#/components/schemas/AnalysisThread"
        - type: object
          properties:
            messages:
              type: array
              items:
                $ref: "#/components/schemas/AnalysisMessage"
          required: [messages]
    AnalysisThreadMessageRequest:
      type: object
      properties:
        content:
          type: string
      required: [content]
    AnalysisRun:
      type: object
      properties:
        run_id:
          type: string
        thread_id:
          type: string
        project_id:
          type: string
        dataset_id:
          type: string
        dataset_version_id:
          type: string
        user_message_id:
          type: string
        request_json:
          type: object
          additionalProperties: true
        result_json:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [running, completed, failed]
        error_message:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        completed_at:
          type:
            - string
            - "null"
          format: date-time
      required: [run_id, thread_id, project_id, dataset_id, dataset_version_id, status, created_at]
    AnalysisThreadMessageResponse:
      type: object
      description: |
        silverone 2026-05-28 — stateful frontend path (`POST /datasets/{did}/analyze`,
        `POST /analysis_threads/{tid}/messages`)의 frontend-safe lightweight 응답.
        DB에는 full result_json / message.context_summary / run.request_json이
        보존되지만, 응답에서는 view schema로 stripping된다.

        debug/replay path (`POST /versions/{vid}/analyze`)는 본 정책에서 제외 —
        full result(`AnalyzeResponse`)를 그대로 반환한다.

        ## 응답 keep 필드 (사용자 명시 2026-05-28)

        | 영역 | keep |
        |---|---|
        | top-level | `project_id`, `dataset_id`, `thread_id`, `dataset_version_id`, `mode`, `user_message`, `assistant_message`, `run`, `result` |
        | `user_message` (AnalysisMessageView) | `message_id`, `role`, `content`, `created_at` |
        | `assistant_message` (AnalysisMessageView) | `message_id`, `role`, `content`, `run_id`, `created_at` |
        | `run` (AnalysisRunView) | `run_id`, `thread_id`, `dataset_version_id`, `user_message_id`, `status`, `error_message`, `created_at`, `completed_at` |
        | `result` (FrontendAnalyzeResultView) | `plan` (plan_version + steps[].id/.skill/.params), `composer` (assistant_content + metadata.{mode,template,fallback_reason} + display.{type,title,columns,rows,total_rows,returned_rows,max_rows,truncated,warnings}), `taxonomy_check` |

        ## 응답 drop 필드

        | 위치 | drop |
        |---|---|
        | `assistant_message` | `context_summary` (DB에는 보존, 다음 turn `conversation_context` 생성에만 사용) |
        | `run` | `request_json` (conversation_context raw 등 internal), `result_json` (top-level `result`와 중복), `project_id` / `dataset_id` (top-level과 중복) |
        | `result` | `steps`, `steps[].sample_rows`, `planner`, `planner.usage`, `planner.attempts`, `planner.attempts[].raw`, `artifact_paths`, `composer.context_summary`, raw prompt / token usage / internal artifact paths |
      properties:
        project_id:
          type: string
        dataset_id:
          type: string
        thread_id:
          type: string
        dataset_version_id:
          type: string
        user_message:
          $ref: "#/components/schemas/AnalysisMessageView"
        assistant_message:
          $ref: "#/components/schemas/AnalysisMessageView"
        run:
          $ref: "#/components/schemas/AnalysisRunView"
        mode:
          type: string
          enum: [user_question]
        result:
          $ref: "#/components/schemas/FrontendAnalyzeResultView"
      required: [project_id, dataset_id, thread_id, dataset_version_id, user_message, run, mode]
    AnalysisMessageView:
      type: object
      description: |
        AnalysisMessage의 frontend-safe view (silverone 2026-05-28).
        `context_summary`는 DB에 저장된 AnalysisMessage에는 보존되지만 응답
        view에서는 stripping된다 (다음 turn `conversation_context` 생성에만 사용,
        사용자 노출 X). `thread_id` / `project_id` / `dataset_id`는 top-level과
        중복이라 view에서 제외.
      properties:
        message_id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        run_id:
          type:
            - string
            - "null"
          description: assistant message만 보유. user message는 omit.
        created_at:
          type: string
          format: date-time
      required: [message_id, role, content, created_at]
    AnalysisRunView:
      type: object
      description: |
        AnalysisRun의 frontend-safe view (silverone 2026-05-28). `request_json`
        (conversation_context raw 등 internal payload) / `result_json` (top-level
        `result`와 중복) / `project_id` / `dataset_id` (top-level과 중복)을
        응답에서 제외한다. DB의 analysis_run row에는 모두 보존된다.
      properties:
        run_id:
          type: string
        thread_id:
          type: string
        dataset_version_id:
          type: string
        user_message_id:
          type: string
        status:
          type: string
          enum: [running, completed, failed]
        error_message:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        completed_at:
          type:
            - string
            - "null"
          format: date-time
      required: [run_id, thread_id, dataset_version_id, status, created_at]
    FrontendAnalyzeResultView:
      type: object
      description: |
        analyze response `result`의 frontend-safe projection (silverone 2026-05-28).
        worker가 만든 full result에서 `plan` / `composer` / `taxonomy_check` 3
        영역만 통과시킨다. 정의되지 않은 top-level result key는 default deny —
        steps / planner / artifact_paths 등은 모두 응답에서 누락된다.
      properties:
        plan:
          $ref: "#/components/schemas/AnalyzePlanView"
        composer:
          $ref: "#/components/schemas/FrontendComposerView"
        taxonomy_check:
          type: object
          additionalProperties: true
          description: |
            clause_label artifact taxonomy 정합성 체크 결과 (Phase 3-B). 4-branch
            status: `ok` / `legacy_missing` / `hash_mismatch` / `id_mismatch`.
      additionalProperties: false
    FrontendComposerView:
      type: object
      description: |
        `result.composer`의 frontend-safe view (silverone 2026-05-28).
        ADR-020 PR-A의 ComposerOutput에서 `context_summary`만 stripping. 나머지
        구조(`assistant_content` / `metadata` / `display`)는 그대로 노출하되
        명시된 sub-field만 통과.
      properties:
        assistant_content:
          type: string
          description: 사용자에게 보여줄 자연어 답변.
        metadata:
          type: object
          properties:
            mode:
              type: string
              enum: [deterministic, llm_backed, deterministic_fallback, error, fallback]
            template:
              type: string
              enum: [table_normal, table_truncated, empty, reuse_applied, failed, fallback]
            fallback_reason:
              type:
                - string
                - "null"
          required: [mode, template]
          additionalProperties: false
        display:
          type: object
          properties:
            type:
              type: string
              enum: [table, chart, json]
            title:
              type:
                - string
                - "null"
            columns:
              type: array
              items:
                type: string
            rows:
              type: array
              items:
                type: object
                additionalProperties: true
            total_rows:
              type: integer
            returned_rows:
              type: integer
            max_rows:
              type: integer
            truncated:
              type: boolean
            warnings:
              type: array
              items:
                type: string
              description: |
                사용자 화면 노출 가능한 짧은 경고 list (display-warnings v1):
                empty / truncated / null ratio 등.
          additionalProperties: false
      required: [assistant_content]
      additionalProperties: false
    AnalyzeUserQuestionRequest:
      type: object
      description: |
        화면 분석 경로(`POST /datasets/{did}/analyze`) request body.
        `user_question` 1 필드만 받는다. 서버가 active version을 고정한 새
        analysis thread를 만들고, dataset별 추가 컬럼은 SourceSummary로 자동 inject한다.
      properties:
        user_question:
          description: 자연어 분석 질의. planner LLM이 받아 plan_v2 생성.
          type: string
      required: [user_question]
    AnalyzeDebugRequest:
      type: object
      description: |
        plan 디버깅 경로(`POST /versions/{vid}/analyze`) request body.
        `plan` 1 필드만 받는다. LLM 호출 없이 validator → executor만 실행.
        화면 분석(자연어 질의)은 본 endpoint가 아니라 `/datasets/{did}/analyze`.
      properties:
        plan:
          description: plan_v2 JSON 객체 (plan_version, steps 등).
          type: object
          additionalProperties: true
      required: [plan]
    AnalyzeResponse:
      type: object
      description: "Python /tasks/analyze 응답을 passthrough + 최소 wrapping (옛 /tasks/analyze_v2는 worker side alias)."
      properties:
        project_id:
          type: string
        dataset_id:
          type: string
        version_id:
          type: string
        mode:
          type: string
          enum: [plan, user_question]
        result:
          description: |
            Python /tasks/analyze 응답 (steps + present + composer + planner).
            Go에서 재가공 X.

            주요 sub-payload:
            - `result.present` — `PresentResultPayload` 형태. SQL-4 정책으로
              `max_rows` / `returned_rows` / `total_rows` / `truncated` 포함.
            - `result.composer` — `ComposerOutput` 형태 (ADR-020 PR-A).
              post-execution layer가 만든 사용자-facing 답변. `assistant_content`
              자연어 + `display` 렌더링 데이터 + `context_summary` 다음 turn용.
              `assistant_message.content` / `assistant_message.context_summary`는
              이 값을 우선 사용한다.
            - `result.plan` — `AnalyzePlanView` 형태 (silverone 2026-05-28).
              planner_v2가 만든 plan_v2 본문. 분석 상세 패널에서 실행 단계를
              보여주는 용도. step.id / step.skill / step.params 3 필드만 표시
              권장 — `inputs` / SQL / sample_rows 등은 operator/debug 영역.

            **Frontend 표시 정책 (silverone 2026-05-28, "플랜만 표시" cut)**:

            *프론트가 사용하는 필드*:
            - `result.composer.assistant_content` — 사용자에게 보여줄 답변 본문
            - `result.composer.display` — 표/차트 렌더링 데이터
            - `result.composer.display.warnings` — 사용자 화면 노출 가능 경고
            - `result.plan` — 분석 상세 패널 (plan_version + steps[].id/.skill/.params)

            *operator/debug 전용 (frontend 노출 X)*:
            - `result.steps` — executor가 만든 step별 실행 결과 (sample_rows 포함)
            - `result.steps[].sample_rows` — step row sample
            - SQL / query 본문 — 미지원
            - `result.plan.steps[].inputs` — plan step 의존성 (frontend cut 1차에서 노출 X)
            - `result.planner.attempts[].raw` — planner LLM raw 응답
            - `result.planner.usage` — token usage
            - `result.artifact_paths` — 내부 storage path
            - `result.composer.context_summary` — 다음 turn 입력용 (사용자 노출 금지)

            include_debug 같은 opt-in 플래그는 이 PR 범위 외. 후속 PR에서 검토.
          type: object
          additionalProperties: true
      required: [project_id, dataset_id, version_id, mode, result]
    AnalyzePlanView:
      type: object
      description: |
        analyze 응답의 `result.plan` 형태 (silverone 2026-05-28, frontend 플랜
        표시 cut 1차). planner_v2 LLM이 만든 plan_v2 본문을 그대로 프론트가
        분석 상세 패널에서 단계 list로 표시한다. plan_v2 본 schema는 Python
        `planner.schema.SKILL_CATALOG`로 잠금되어 있고 본 view는 *프론트가
        실제로 사용하는 부분만* 명시한 reference schema다.

        ## 권장 렌더링 (silverone 2026-05-28)

        ```
        1. real_reviews / filter
        2. joined / join
        3. with_doc / join
        4. last_year / filter
        5. this_year / filter
        6. last_by_aspect / aggregate
        7. this_by_aspect / aggregate
        8. delta_pair / compare
        9. delta / calculate
        10. present_delta / present
        ```

        format: `{index}. {step.id} / {step.skill}` 한 줄 + clicked detail에
        `step.params`. `inputs` / SQL / sample_rows / planner.attempts.raw /
        usage / artifact_paths는 화면에 노출하지 않는다.
      properties:
        plan_version:
          type: string
          enum: [v2]
          description: plan_v2 wire contract. rename PR 이후에도 v2 유지.
        steps:
          type: array
          items:
            $ref: "#/components/schemas/AnalyzePlanStepView"
        answerable:
          type: boolean
          description: |
            (silverone 2026-06-01, PR1) plan으로 답할 수 없는 질문이면 `false`.
            생략 시 `true`. `false`면 `steps`는 빈 배열이고 `reason` / `message`가
            채워진다.
        reason:
          type: string
          enum: [out_of_dataset_scope, unsupported_skill, missing_data_or_artifact]
          description: |
            `answerable=false`일 때 거절 사유. out_of_dataset_scope(데이터셋 무관
            외부/일반 질문), unsupported_skill(데이터셋 관련이나 현 skill 미지원),
            missing_data_or_artifact(필요 컬럼/아티팩트 부재).
        message:
          type: string
          description: "`answerable=false`일 때 사용자에게 보여줄 거절 사유 문구."
        capability_gap:
          type: object
          description: |
            `reason=unsupported_skill`일 때 동반. skill upgrade backlog 저장
            후보(PR2). requested_capability / suggested_skill / evidence 등.
          additionalProperties: true
      required: [plan_version, steps]
    AnalyzePlanStepView:
      type: object
      description: |
        `result.plan.steps[]`의 frontend 표시 필드. silverone 2026-05-28 cut
        1차에서는 id / skill / params 3 필드만 노출했고, silverone 2026-06-01
        에 백엔드가 합성한 사용자 화면용 `display = {label, expression}`이
        추가됐다. `inputs`는 plan_v2 스키마에 존재하지만 frontend 노출 대상이
        아니며 (의존 그래프는 operator/debug 영역) 후속 PR에서 별도 cut으로
        다룬다.
      properties:
        id:
          type: string
          description: step 식별자. plan 내 다른 step의 `inputs`로 참조된다.
        skill:
          type: string
          enum: [join, filter, aggregate, compare, calculate, sort, present, summarize]
          description: plan_v2 8 skill catalog. `planner.schema.SKILL_CATALOG` 잠금.
        params:
          type: object
          additionalProperties: true
          description: |
            skill별 parameter object. validator가 skill별 hardcoded rule로
            검증한다. 프론트가 직접 해석하지 않고 `display`를 우선 사용 —
            `display`가 없으면 raw params로 fallback 한다. 고급 보기 안에서만
            raw 노출 권장.
        display:
          type: object
          description: |
            백엔드가 합성한 사용자 화면용 표시 필드 (silverone 2026-06-01).
            프론트는 `label` / `expression`만 렌더링해도 분석 계획 화면이
            완성되도록 설계됐다. raw params JSON은 고급 보기에만 노출.

            예시:
            - filter: `{label: "조건 필터", expression: "WHERE genuineness != 'non_review'"}`
            - aggregate: `{label: "aspect별 집계", expression: "GROUP BY aspect · COUNT(*) AS count"}`
            - sort: `{label: "정렬", expression: "ORDER BY count DESC"}`
            - calculate(ratio): `{label: "비율 계산", expression: "negative_ratio = negative_count / total_count * 100"}`
            - calculate(share_of_total): `{label: "비중 계산", expression: "ratio = count / 전체 합계 * 100"}`
            - present: `{label: "결과 표시", expression: "TABLE: 아스펙트별 건수"}`

            expression은 SQL-like 직관 표현이며 실제 executor SQL과는 무관
            (debug 노출 금지). 알 수 없는 skill이거나 params가 깨져 있으면
            display 자체가 omit되고 프론트는 raw params로 fallback.
          properties:
            label:
              type: string
              description: skill 종류별 한국어 일반명 (예 "조건 필터", "정렬").
            expression:
              type: string
              description: SQL-like 직관 표현 1줄.
          required: [label, expression]
      required: [id, skill, params]
    PresentResultPayload:
      type: object
      description: |
        analyze 응답의 `result.present` 형태 (SQL-4, audit M7).
        present skill이 최종 결과 row를 `rows`에 담아 반환한다. 한도 정책:
        - default `max_rows` = 1000
        - plan에 `present.limit`이 명시되면 그 값을 사용 (1~10000 허용, validator에서 reject)
        - hard cap = 10000. validator를 통과해도 executor에서 다시 한 번 clamp.
      properties:
        step_id:
          type: string
        format:
          type: string
          enum: [table, chart, json]
        title:
          type:
            - string
            - "null"
        row_count:
          type: integer
          description: |
            호환 필드 — `total_rows`와 동일한 값을 갖는다. SQL-4 이전 코드/화면이
            row_count를 참조하던 것을 깨지 않기 위해 유지.
        total_rows:
          type: integer
          description: 전체 결과 row 수 (DuckDB COUNT).
        returned_rows:
          type: integer
          description: 응답에 실제로 담은 rows 배열의 길이.
        max_rows:
          type: integer
          description: 이번 응답에 적용된 반환 한도. default 1000, present.limit 명시 시 해당 값.
        truncated:
          type: boolean
          description: returned_rows < total_rows이면 true.
        rows:
          type: array
          description: present 결과 데이터. 최대 max_rows건.
          items:
            type: object
            additionalProperties: true
      required: [step_id, format, row_count, total_rows, returned_rows, max_rows, truncated, rows]
    ComposerOutput:
      type: object
      description: |
        analyze 응답의 `result.composer` 형태 (ADR-020 PR-A).
        post-execution layer가 executor 결과를 사용자-facing 답변으로 변환한다.
        PR-A는 LLM 호출 없이 deterministic 템플릿 5종으로 생성. 후속 PR-B에서
        LLM composer가 `assistant_content`를 보강한다.

        저장 경로:
        - `assistant_message.content` ← `composer.assistant_content`
        - `assistant_message.context_summary` ← `composer.context_summary`
        - `analysis_run.result_json.composer` ← composer 전체 payload (debug/audit)

        실행이 실패한 turn은 composer를 호출하지 않고 별도 placeholder 정책 적용
        (`analysis_api_model_2026-05-26` §4).
      properties:
        assistant_content:
          type: string
          description: 사용자에게 보여줄 자연어 답변. assistant_message.content로 저장.
        display:
          anyOf:
            - $ref: "#/components/schemas/ComposerDisplay"
            - type: "null"
          description: 프론트 렌더링용 데이터. PR-A에서는 present payload를 거의 그대로 전달.
        context_summary:
          $ref: "#/components/schemas/ComposerContextSummary"
        metadata:
          $ref: "#/components/schemas/ComposerMetadata"
      required: [assistant_content, context_summary, metadata]
    ComposerDisplay:
      type: object
      description: |
        프론트 표/차트/JSON 렌더링용 페이로드. `result.present`와 거의 동일한
        shape이며 ADR-020 PR-A에서는 변환 없이 그대로 전달한다. 자연어 답변
        (`assistant_content`)과 데이터 (`display`)를 분리해 화면이 각각 처리.
        v1은 table-first — `recommended_view` / `chart_spec`는 chart-ready
        metadata 힌트만 제공하고, 완전한 chart spec(Vega-Lite 등)은 v2로 보류.
      properties:
        type:
          type: string
          enum: [table, chart, json]
          description: present.format을 그대로 매핑.
        title:
          type:
            - string
            - "null"
        columns:
          type: array
          items:
            type: string
          description: |
            프론트 table 렌더링용 컬럼 key 순서 (silverone 2026-05-27 display-columns).
            v1은 string list만 — `rows[0]`의 key 순서를 그대로 노출. rows가
            비어있으면 `[]`. label / type / format / chart_spec 등 보강 필드는
            후속 PR.
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        total_rows:
          type: integer
          description: 전체 결과 row 수.
        returned_rows:
          type: integer
          description: rows 배열의 길이.
        max_rows:
          type: integer
          description: 적용된 반환 한도 (default 1000).
        truncated:
          type: boolean
          description: returned_rows < total_rows이면 true.
        warnings:
          type: array
          items:
            type: string
          description: |
            사용자 화면 노출 가능한 짧은 경고 문자열 list (silverone 2026-05-27
            display-warnings v1). v1 후보 3종:
            (1) empty result — "조건에 맞는 결과가 없습니다."
            (2) truncated — "전체 {total_rows}건 중 {returned_rows}건만 표시했습니다."
            (3) null ratio/percent_change/share_of_total — "일부 비율 값은
            기준값이 없어 계산되지 않았습니다." (plan.calculate.ratio /
            percent_change / share_of_total expression의 결과 column에 null
            row가 있을 때).
            warnings는 사용자에게 노출. context_summary는 노출 금지.
            normal result는 `[]`.
        recommended_view:
          type: string
          enum: [table, bar, line]
          description: |
            프론트가 기본 렌더링할 view 힌트 (silverone 2026-06-01 chart-ready
            metadata v1). deterministic 휴리스틱:
            - rows 0건 / 1건 / 단일 컬럼 → `table`
            - compare 결과 (delta_* 또는 last_*/this_* 컬럼 존재) → `bar`
            - x축이 created_at/year/month/date 계열 + numeric metric → `line`
            - 단일 categorical group_by + numeric metric → `bar`
            - 모호하면 `table`
            display.type은 항상 "table" 유지 — recommended_view는 화면 힌트만.
            pie / scatter는 v2로 보류.
        chart_spec:
          anyOf:
            - type: object
              properties:
                kind:
                  type: string
                  enum: [bar, line]
                x:
                  type: string
                  description: x축으로 쓸 컬럼 key.
                y:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                  description: |
                    y축으로 쓸 컬럼 key. 단일 numeric metric이면 string,
                    compare처럼 last_/this_/delta_ 다중 metric을 한 그래프에
                    묶을 때는 array.
                series:
                  type:
                    - string
                    - "null"
                  description: |
                    series로 나눌 컬럼 key. v1은 항상 null — 단일 dimension만
                    추정한다. compare는 wide-format(한 row에 last/this/delta가
                    모여 있음)이라 series 분기가 불필요.
              required: [kind, x, y, series]
            - type: "null"
          description: |
            chart 렌더링에 필요한 최소 spec (silverone 2026-06-01 chart-ready
            metadata v1). `recommended_view`가 `table`이면 항상 null.
      required: [type, columns, rows, total_rows, returned_rows, max_rows, truncated, warnings, recommended_view, chart_spec]
    ComposerContextSummary:
      type: object
      description: |
        다음 turn의 conversation_context를 만들 때 사용되는 짧은 구조화 요약.
        **사용자에게 직접 노출하지 않는다**. `assistant_message.context_summary`로
        저장되어 후속 PostAnalysisThreadMessage에서 worker payload의
        `conversation_context`로 inject된다 (최근 3턴 / 2000 bytes 한도).
        ADR-020 PR-A v1은 LLM 요약 없이 deterministic 생성.
      properties:
        question:
          type: string
          description: user_question. 호출자(Go control plane)가 caller-supplied 값으로 덮어쓴다.
        present_title:
          type:
            - string
            - "null"
        total_rows:
          type: integer
        row_count:
          type: integer
          description: 호환 필드 — total_rows와 동일.
        returned_rows:
          type: integer
        columns:
          type: array
          items:
            type: string
          description: present.rows[0]의 컬럼명 list.
        key_dimensions:
          type: array
          items:
            type: string
          description: PR-A 1차 cut에서는 columns와 동일. 후속 PR에서 의미 분화 가능.
        answer_summary:
          type: string
          description: assistant_content와 동일 (한 문장 deterministic 요약).
      additionalProperties: true
    ComposerMetadata:
      type: object
      description: composer debug/audit 정보. 화면 default 노출 X.
      properties:
        mode:
          type: string
          enum: [deterministic, llm_backed, deterministic_fallback, error, fallback, rejected]
          description: |
            - deterministic: PR-A 정상 흐름 (현재 default).
            - llm_backed / deterministic_fallback: PR-B 도입 후 사용.
            - error: error_metadata 분기로 placeholder 문구 사용.
            - fallback: composer가 present를 못 읽거나 예외 발생.
            - rejected: (PR1) planner가 answerable=false로 거절. display=null.
        template:
          type: string
          enum: [table_normal, table_truncated, empty, reuse_applied, failed, fallback, rejected]
        fallback_reason:
          type:
            - string
            - "null"
          description: mode != deterministic일 때 진단용 사유. 정상이면 null.
        reason:
          type: string
          enum: [out_of_dataset_scope, unsupported_skill, missing_data_or_artifact]
          description: |
            (PR1) mode=rejected일 때 거절 사유 taxonomy. plan.reason과 동일 값.
            프론트 reason별 처리 / 운영 rejection event(PR2) 집계에 사용.
        capability_gap:
          type: object
          description: |
            (PR1) reason=unsupported_skill일 때 skill upgrade backlog 후보 정보.
          additionalProperties: true
      required: [mode, template]
    ArtifactPagination:
      type: object
      description: doc_genuineness / clause_label view에서만 사용. items 페이지네이션.
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
          description: 전체 행 수 (summary 통계는 total 기반, items는 페이지 슬라이스).
      required: [limit, offset, total]
    ArtifactProgress:
      type: object
      description: |
        build job 진행률. worker가 progress 파일(`{prefix}_progress_ref`)에 percent /
        processed_rows / total_rows를 쓰면 service가 매 GET마다 읽어서 노출.
        status=`running` 외 단계에서는 정보가 없거나 stale일 수 있다.
      properties:
        percent:
          type: number
          format: double
        processed_rows:
          type: integer
        total_rows:
          type: integer
        eta_seconds:
          type:
            - number
            - "null"
          format: double
        message:
          type: string
        updated_at:
          type:
            - string
            - "null"
          format: date-time
      required: [percent]
    ArtifactViewCommon:
      type: object
      description: |
        clean / doc_genuineness / clause_label 3 view가 공유하는 공통 필드.
        화면은 이 필드만 polling하면 build job 진행 상태를 단일 진입점으로
        추적할 수 있다.

        status enum:
        - not_started: artifact 없음 + 같은 build_type의 job 없음
        - queued / running / failed: 최신 build job status를 그대로 노출
        - completed: artifact ready + 최신 job completed
      properties:
        build_type:
          type: string
          enum: [clean, doc_genuineness, clause_label]
        status:
          type: string
          enum: [not_started, queued, running, failed, completed]
        job_id:
          type:
            - string
            - "null"
          description: 가장 최근 build job ID. 옛 dataset에서 job row 없이 artifact만 남은 경우 null.
        started_at:
          type:
            - string
            - "null"
          format: date-time
        completed_at:
          type:
            - string
            - "null"
          format: date-time
        duration_seconds:
          type:
            - number
            - "null"
          description: |
            작업 경과 시간(초). 화면이 started_at/completed_at를 직접 빼지
            않아도 되게 서버가 채운다.
            - completed/failed: `completed_at - started_at` (확정).
            - queued/running: `now - started_at` (진행 중 실시간).
            - `started_at`이 null이면 null.
        error_message:
          type:
            - string
            - "null"
          description: status=`failed` 또는 worker 측 일시 오류 메시지. 그 외는 null.
        progress:
          anyOf:
            - $ref: "#/components/schemas/ArtifactProgress"
            - type: "null"
      required: [build_type, status]
    CleanView:
      allOf:
        - $ref: "#/components/schemas/ArtifactViewCommon"
        - type: object
          description: |
            GET /versions/{vid}/clean 응답. status=`completed`일 때만 summary가
            의미 있다. clean은 단계 특성상 items / pagination / applied 없음
            (원본 raw row는 `/clean_download`로 받는다).
          properties:
            summary:
              type: object
              description: |
                clean 결과 통계. input/output/kept/dropped row count, text 컬럼,
                clean 전후 char count 등.
              additionalProperties: true
    DocGenuinenessView:
      allOf:
        - $ref: "#/components/schemas/ArtifactViewCommon"
        - type: object
          description: |
            GET /versions/{vid}/doc_genuineness 응답. status=`completed`일 때만
            summary/items가 의미 있다. queued/running/failed/not_started 상태
            에서는 summary 비어 있고 items=[]일 수 있다.
          properties:
            applied:
              type: object
              description: 실제 적용된 prompt_version 등. artifact 첫 행에서 회수.
              properties:
                prompt_version:
                  type: string
            summary:
              type: object
              properties:
                total:
                  type: integer
                genuineness:
                  type: object
                  additionalProperties:
                    type: integer
                  description: "key: genuine_review / mixed / non_review / unknown / value: doc count"
            items:
              type: array
              items:
                type: object
                properties:
                  doc_id:
                    type: string
                  genuineness:
                    type: string
                  reason:
                    type:
                      - string
                      - "null"
                  source:
                    type:
                      - string
                      - "null"
            pagination:
              $ref: "#/components/schemas/ArtifactPagination"
    ClauseLabelView:
      allOf:
        - $ref: "#/components/schemas/ArtifactViewCommon"
        - type: object
          description: |
            GET /versions/{vid}/clause_label 응답. clause_id는 artifact에 저장돼
            있지 않아 `{doc_id}-{partition_row_index}` (0-base) 형식으로
            on-the-fly 생성된다. 같은 artifact 재조회 시 같은 clause_id가 나온다.
          properties:
            applied:
              type: object
              properties:
                prompt_version:
                  type: string
            summary:
              type: object
              properties:
                total:
                  type: integer
                sentiment:
                  type: object
                  additionalProperties:
                    type: integer
                  description: "key: positive / neutral / negative / unknown / value: clause count"
                aspect:
                  type: object
                  additionalProperties:
                    type: integer
                  description: "key: aspect label / value: clause count"
            items:
              type: array
              items:
                type: object
                properties:
                  clause_id:
                    type: string
                    description: "`{doc_id}-{partition_row_index}` 형식 (0-base)"
                  doc_id:
                    type: string
                  clause:
                    type: string
                  sentiment:
                    type:
                      - string
                      - "null"
                  aspect:
                    type:
                      - string
                      - "null"
                  source:
                    type:
                      - string
                      - "null"
            pagination:
              $ref: "#/components/schemas/ArtifactPagination"
    DatasetBuildJobAccepted:
      type: object
      description: |
        POST /clean / /doc_genuineness / /clause_label 응답 slim shape.
        2026-05-21 결정: project_id/dataset_id/dataset_version_id는 URL path에
        이미 있고, attempt/triggered_by/workflow_*/diagnostics 같은 상세 필드는
        GET /dataset_build_jobs/{job_id} 또는 /versions/{version_id}/build_jobs
        로 위임한다. POST 응답은 "큐에 들어갔다" 알림 + polling key + 상태만.
      properties:
        job_id:
          type: string
        build_type:
          type: string
          enum: [clean, doc_genuineness, clause_label]
        status:
          type: string
        created_at:
          type: string
          format: date-time
      required: [job_id, build_type, status, created_at]
    DatasetBuildJob:
      type: object
      properties:
        job_id:
          type: string
        project_id:
          type: string
        dataset_id:
          type: string
        dataset_version_id:
          type: string
        build_type:
          type: string
          enum: [clean, doc_genuineness, clause_label]
          description: |
            현재 hot path dataset_build task 3종 (ADR-018 β2 결정).
            옛 prepare / sentiment / embedding / cluster / segment / embedding_cluster /
            keyword_index / document_cluster_profile는 모두 삭제됐다.
        status:
          type: string
        request:
          $ref: "#/components/schemas/AnyMap"
        triggered_by:
          type: string
        workflow_id:
          type:
            - string
            - "null"
        workflow_run_id:
          type:
            - string
            - "null"
        attempt:
          type: integer
        last_error_type:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        started_at:
          type:
            - string
            - "null"
          format: date-time
        completed_at:
          type:
            - string
            - "null"
          format: date-time
        error_message:
          type:
            - string
            - "null"
        diagnostics:
          anyOf:
            - $ref: "#/components/schemas/BuildJobDiagnostics"
            - type: "null"
      required:
        - job_id
        - project_id
        - dataset_id
        - dataset_version_id
        - build_type
        - status
        - attempt
        - created_at
    DatasetBuildJobListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DatasetBuildJob"
      required: [items]
    BuildJobDiagnostics:
      type: object
      properties:
        retry_count:
          type: integer
        last_error_type:
          type:
            - string
            - "null"
        last_error_message:
          type:
            - string
            - "null"
        workflow_id:
          type:
            - string
            - "null"
        workflow_run_id:
          type:
            - string
            - "null"
        progress:
          anyOf:
            - $ref: "#/components/schemas/BuildJobProgress"
            - type: "null"
        llm_fallback:
          type: boolean
          description: LLM 호출 실패 후 deterministic fallback이 사용되었는지 여부
        llm_fallback_reason:
          type:
            - string
            - "null"
          description: LLM fallback이 발생한 대표 사유
        llm_fallback_count:
          type: integer
          description: LLM fallback이 적용된 row 수
        llm_provider:
          type:
            - string
            - "null"
          description: fallback 전 시도한 LLM provider
        llm_model:
          type:
            - string
            - "null"
          description: fallback 전 시도한 LLM model
        warnings:
          type: array
          items:
            type: string
      required: [retry_count]
    BuildJobProgress:
      type: object
      properties:
        percent:
          type: number
          format: float
        processed_rows:
          type: integer
        total_rows:
          type: integer
        elapsed_seconds:
          type: number
          format: float
        eta_seconds:
          type:
            - number
            - "null"
          format: float
        message:
          type: string
        updated_at:
          type:
            - string
            - "null"
          format: date-time
      required: [percent, processed_rows, total_rows]
    DatasetDocGenuinenessBuildRequest:
      type: object
      description: "ADR-017 / 5/19 — clean 직후 doc-level 3-tier 진성 분류 build payload. LLOA 호출이므로 worker에 LLOA_API_KEY 필수. 5/20 결정으로 output_path/max_tokens 제거 — worker default 사용."
      properties:
        doc_genuineness_prompt_version:
          type: string
          description: "사용할 prompt version stem (예: v1). GET /prompt_options?task=doc_genuineness의 versions[].version 값. 미지정 시 index.yaml default. 알 수 없는 version은 400. inline prompt(doc_genuineness_prompt_content) 사용 시엔 그 inline의 label로 쓰인다. artifact의 prompt_version에는 실제 resolve된 stem이 기록된다."
        force:
          type: boolean
          default: false
    DatasetClauseLabelBuildRequest:
      type: object
      description: "ADR-017 / 5/19 + 5/20 — cleaned doc 단위 LLOA 한 호출 절 분리 + sentiment + aspect 라벨링 build payload. prompt v3 schema (clause/sentiment/aspect 3 필드). 5/20 결정으로 output_path/batch_size/max_tokens/aspect_taxonomy_version 제거 — worker default 사용 + default include_genuineness=[\"genuine_review\",\"mixed\"]."
      properties:
        clause_label_prompt_version:
          type: string
          description: "사용할 prompt version stem (예: v3). GET /prompt_options?task=clause_label의 versions[].version 값. 미지정 시 index.yaml default. 알 수 없는 version은 400. inline prompt(clause_label_prompt_content) 사용 시엔 그 inline의 label로 쓰인다. artifact의 prompt_version에는 실제 resolve된 stem이 기록된다."
        include_genuineness:
          type: array
          items:
            type: string
            enum: [genuine_review, mixed, non_review]
          description: "doc_genuineness 결과로 필터링 (예: ['genuine_review','mixed']). 명시 안 하면 모든 doc 처리. 명시 시 doc_genuineness ready 필요."
        force: { type: boolean }
