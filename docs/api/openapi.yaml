        clean:
          $ref: "#/components/schemas/DatasetVersionStageDetail"
        doc_genuineness:
          $ref: "#/components/schemas/DatasetVersionStageDetail"
        clause_label:
          $ref: "#/components/schemas/DatasetVersionStageDetail"
      required: [dataset_version_id, created_at, is_active, row_count, column_count, columns, byte_size, clean, doc_genuineness, clause_label]
    DatasetVersionStageDetail:
      type: object
      properties:
        status:
          type: string
        completed_at:
          type:
            - string
            - "null"
          format: date-time
        summary:
          description: |
            단계 처리 결과 요약. 단계별 키 셋이 다름.

            silverone 2026-05-28 (C 옵션) — `doc_genuineness` / `clause_label`은 build-detail
            (`GET /datasets/.../{type}`)과 동일한 normalized core를 노출하면서 운영·감사용
            metadata는 superset으로 포함한다. 프론트 매퍼는 normalized key만 사용한다.

            - `doc_genuineness`: core `{ genuineness: {genuine_review, mixed, non_review, uncertain}, total }`
              + metadata (`applied`, `model`, `prompt_version`, `input_row_count`, `processed_row_count`,
              `parse_failures`, `total_prompt_tokens`, `total_completion_tokens`).
              `total`은 `processed_row_count`가 있으면 우선, 없으면 `genuineness` 값 합.
            - `clause_label`: core `{ aspect: {...}, sentiment: {positive,negative,neutral}, total }`
              + metadata (`applied`, `model`, `prompt_version`, `taxonomy_id`, `taxonomy_hash`,
              `reasoning_effort`, `concurrency`, `include_genuineness`, `skipped_by_filter`,
              `skipped_empty`, `parse_failures`, `processed_doc_count`, `input_row_count`,
              `total_prompt_tokens`, `total_completion_tokens`).
              `total`은 `clause_count`에서 옮겨진 값.
            - `clean`: `{ input_row_count, output_row_count, kept_count, dropped_count, text_column, text_columns, text_joiner, clean_regex_rule_hits, ... }`.

            raw count key (`tier_counts` / `aspect_counts` / `sentiment_counts` / `clause_count`)는
            응답에 노출되지 않는다 (저장된 metadata 자체는 유지).
          type: object
          additionalProperties: true
      required: [status]
    DatasetVersionListItem:
