        둘 다 허용한다. top-level key 단위 merge — patch에 있는 key는
        overwrite, 없는 key는 보존. nested object는 deep merge 하지 않음.
      properties:
        metadata:
          type: object
          additionalProperties: true
          description: |
            새 metadata patch. 생략하면 top-level key가 patch 본문으로 그대로
