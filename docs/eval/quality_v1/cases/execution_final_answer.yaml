# Quality eval cases for execution_final_answer
#
# These cases validate that the LLM presenter (or its mocked stub) wraps the
# upstream `result_v1` payload into a grounded final answer that:
#   - keeps language/domain consistent with the upstream summary
#   - never invents facts that aren't in result_v1
#   - includes caveats when warnings exist or evidence is thin
#
# Schema differences vs issue_evidence_summary cases:
#   - artifact lives under `result.answer` and `result.artifact`; the runner
#     reads `artifact` for predicate checks (which is a copy of `answer` with
#     `skill_name` injected — see `presentation._artifact_view`).
#   - `summary_must_contain` checks the answer.answer_text via the artifact.
- case_id: fa_001
  description: 결제 오류 도메인 result_v1 → 결제 오류가 final answer에 보존되어야 함
  skill_name: execution_final_answer
  payload:
    execution_id: eval-fa-001
    project_id: project-eval
    question: 결제 오류 VOC 핵심을 알려줘
    context:
      scenario_id: eval-payment
    result_v1:
      status: completed
      primary_skill_name: issue_evidence_summary
      answer:
        summary: 결제 오류가 반복되고 있습니다.
        key_findings:
          - 결제 오류 VOC가 반복된다
        evidence:
          - rank: 1
            snippet: 결제 오류가 반복 발생했습니다
            rationale: 결제 오류 반복 발생을 보여주는 대표 VOC
            source_index: 0
        follow_up_questions:
          - 결제 실패 구간을 더 볼까요?
      warnings:
        - 확인 필요 — 샘플 수가 제한적입니다
      step_results:
        - step_id: step-1
          skill_name: issue_evidence_summary
          status: completed
          summary: 결제 오류가 반복되고 있습니다.
  expected:
    summary_must_contain:
      - 결제
    summary_must_not_contain:
      - 강릉
      - 야행
    min_evidence_count: 1
    max_evidence_count: 6
    min_key_findings_count: 1
    quality_tier: llm_dependent

- case_id: fa_002
  description: 강릉 야행 도메인 → final answer에 도메인 키워드 보존
  skill_name: execution_final_answer
  payload:
    execution_id: eval-fa-002
    project_id: project-eval
    question: 강릉 문화재 야행 핵심을 알려줘
    context:
      scenario_id: eval-festival
    result_v1:
      status: completed
      primary_skill_name: issue_evidence_summary
      answer:
        summary: 강릉 문화재 야행 후기가 다수 수집되었습니다.
        key_findings:
          - 강릉 문화재 야행에 대한 긍정 후기 다수
        evidence:
          - rank: 1
            snippet: 강릉 문화재 야행 다녀왔습니다
            rationale: 야행 방문 후기 대표 텍스트
            source_index: 0
        follow_up_questions:
          - 야행 프로그램별로 더 볼까요?
      warnings: []
      step_results:
        - step_id: step-1
          skill_name: issue_evidence_summary
          status: completed
          summary: 강릉 문화재 야행 후기가 다수 수집되었습니다.
  expected:
    summary_must_contain:
      - 강릉
    summary_must_not_contain:
      - 결제
    min_evidence_count: 1
    max_evidence_count: 6
    min_key_findings_count: 1
    quality_tier: llm_dependent

- case_id: fa_003
  description: warning이 있는 result_v1 → final answer에 caveat 1건 이상
  skill_name: execution_final_answer
  payload:
    execution_id: eval-fa-003
    project_id: project-eval
    question: 결제 오류 추세를 알려줘
    context:
      scenario_id: eval-warnings
    result_v1:
      status: completed
      primary_skill_name: issue_evidence_summary
      answer:
        summary: 결제 오류 추세가 일정 구간에 집중됩니다.
        key_findings:
          - 결제 오류는 특정 시간대에 집중
        evidence:
          - rank: 1
            snippet: 결제가 자꾸 실패해요
            rationale: 결제 실패 빈발을 보여주는 단일 VOC (sample 부족)
            source_index: 0
        follow_up_questions: []
      warnings:
        - 확인 필요 — 데이터 기간이 짧아 추세 해석 신뢰도 낮음
        - 확인 필요 — sample 수 부족
      step_results:
        - step_id: step-1
          skill_name: issue_evidence_summary
          status: completed
          summary: 결제 오류 추세가 일정 구간에 집중됩니다.
  expected:
    summary_must_contain:
      - 결제
    min_evidence_count: 1
    min_key_findings_count: 1
    min_caveat_count: 1
    quality_tier: llm_dependent
