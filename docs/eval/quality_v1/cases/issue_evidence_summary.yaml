# Quality eval cases for issue_evidence_summary
#
# Schema (per case):
#   case_id: short stable identifier (eval report keyed by this)
#   description: human-friendly intent (Korean OK)
#   skill_name: target skill (must match runtime task name)
#   payload: input passed to run_task(skill_name, payload)
#   expected:
#     summary_must_contain:    list[str] — substrings that should appear in artifact.summary
#     summary_must_not_contain: list[str] — substrings that must NOT appear (anti-leakage)
#     min_evidence_count:      int — len(artifact.evidence) >= N
#     max_evidence_count:      int — len(artifact.evidence) <= N
#     min_key_findings_count:  int — len(artifact.key_findings) >= N
#     quality_tier:            "heuristic" | "deterministic" | "llm_dependent"
#     selection_source_in:     list[str] — artifact.selection_source must be one of these
#
# Notes:
# - These cases assume the LLM presenter is mocked in tests (deterministic stub
#   matching the existing test_skill_cases pattern). The runner exposes
#   `--allow-llm` to invoke real Anthropic calls; default is mocked.
# - Dataset references resolve to docs/eval/quality_v1/datasets/<name>.csv.
- case_id: ev_001
  description: 강릉 문화재 야행 핵심 후기 정리
  skill_name: issue_evidence_summary
  payload:
    dataset_name: festival_sample_50
    text_column: 본문
    sample_n: 5
    goal: 강릉 문화재 야행 후기를 정리해줘
    prior_artifacts: []
  expected:
    summary_must_contain:
      - 강릉
    summary_must_not_contain:
      - 결제 오류
      - 로그인
    min_evidence_count: 1
    max_evidence_count: 8
    min_key_findings_count: 1
    quality_tier: llm_dependent
    selection_source_in:
      - lexical_overlap
      - semantic_search
      - cluster_membership
      - document_sample

- case_id: ev_002
  description: 야시·야경·야설 등 야행 프로그램 키워드가 evidence에 등장하는지 확인
  skill_name: issue_evidence_summary
  payload:
    dataset_name: festival_sample_50
    text_column: 본문
    sample_n: 8
    goal: 강릉 문화재 야행에서 어떤 프로그램들이 운영됐는지 알려줘
    prior_artifacts: []
  expected:
    summary_must_contain:
      - 야행
    summary_must_not_contain:
      - 결제
      - 환불
    min_evidence_count: 2
    max_evidence_count: 8
    min_key_findings_count: 1
    quality_tier: llm_dependent

- case_id: ev_003
  description: 채널 정보가 evidence rationale에 leak 되지 않는지 (사용자 노출 데이터 위생)
  skill_name: issue_evidence_summary
  payload:
    dataset_name: festival_sample_50
    text_column: 본문
    sample_n: 5
    goal: 강릉 야행 행사 일정을 알려줘
    prior_artifacts: []
  expected:
    summary_must_contain:
      - 강릉
    summary_must_not_contain:
      - example.invalid
      - anon-
    min_evidence_count: 1
    max_evidence_count: 8
    min_key_findings_count: 1
    quality_tier: llm_dependent

- case_id: ev_004
  description: 빈 입력에서 graceful empty가 strict_fail 위반으로 잡히는지 (negative test)
  skill_name: issue_evidence_summary
  payload:
    dataset_name: festival_sample_empty
    text_column: 본문
    sample_n: 5
    goal: 강릉 야행 후기 정리
    prior_artifacts: []
  expected:
    expect_skill_output_error: true
    expected_error_substring: strict_fail

- case_id: ev_005
  description: 검색 의도가 모호해도 한국어 evidence가 비어있지 않게 나오는지
  skill_name: issue_evidence_summary
  payload:
    dataset_name: festival_sample_50
    text_column: 본문
    sample_n: 6
    goal: 축제 분위기를 한 문단으로 요약해줘
    prior_artifacts: []
  expected:
    summary_must_contain:
      - 축제
    min_evidence_count: 1
    max_evidence_count: 8
    min_key_findings_count: 1
    quality_tier: llm_dependent
