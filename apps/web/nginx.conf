# silverone 2026-06-01 — SPA 정적 serve + /api reverse-proxy (Option B).
# 브라우저는 web 컨테이너(:5173)만 호출하는 동일출처 구조. axios는
# VITE_API_BASE_URL=/api 로 빌드되어 `/api/...` 로 요청하고, nginx가 그 요청을
# control-plane으로 프록시하며 `/api` prefix를 떼어 전달한다.
# (동일출처라 Content-Disposition 등 응답 헤더가 JS에 그대로 노출 → 다운로드
#  파일명 정상. 백엔드 CORS 수정 불필요.)
#
# 컨테이너 간 통신은 docker 서비스명+내부포트(control-plane:8080)로 간다 —
# 18080은 호스트 published 포트라 web 컨테이너에서 닿지 않는다.
server {
    listen 80;
    server_name _;

    # silverone 2026-06-26 — 데이터셋 파일 업로드(/api/.../uploads) 413 방지.
    # nginx 기본 client_max_body_size는 1MB라 큰 CSV/xlsx 업로드가 프록시 단계에서
    # 막혔다(staging은 web nginx → control-plane 경유). control-plane이 받는
    # ParseMultipartForm(64MB)에 맞춰 정렬한다.
    client_max_body_size 64m;

    root /usr/share/nginx/html;
    index index.html;

    # /api/* → control-plane. proxy_pass 끝의 `/` 가 location 접두사(/api/)를
    # `/` 로 치환해 prefix를 제거한다. 예: /api/projects → control-plane:8080/projects
    location /api/ {
        proxy_pass http://control-plane:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /index.html =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
