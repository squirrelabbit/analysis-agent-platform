services:
  postgres:
    image: pgvector/pgvector:pg16
    command:
      - postgres
      - -c
      - timezone=Asia/Seoul
      - -c
      - log_timezone=Asia/Seoul
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: postgres
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./apps/control-plane/dev/postgres-init.sql:/docker-entrypoint-initdb.d/10-analysis_support.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal:
    image: temporalio/temporal:latest
    command: ["server", "start-dev", "--ip", "0.0.0.0", "--namespace", "default"]
    environment:
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:17233:7233"
    restart: unless-stopped

  python-ai-worker:
    build:
      context: .
      dockerfile: workers/python-ai/Dockerfile
    environment:
      TZ: Asia/Seoul
      PYTHON_AI_WORKER_HOST: 0.0.0.0
      PYTHON_AI_WORKER_PORT: 8090
      PYTHON_AI_LLM_PROVIDER: anthropic
      DATABASE_URL: postgresql://platform:platform@postgres:5432/analysis_support
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_TIMEOUT_SEC: ${ANTHROPIC_TIMEOUT_SEC:-90}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-0}
      OPENAI_EMBEDDING_BATCH_SIZE: ${OPENAI_EMBEDDING_BATCH_SIZE:-32}
      OPENAI_TIMEOUT_SEC: ${OPENAI_TIMEOUT_SEC:-30}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
      # ADR-017 / 5/19 결정 — LLOA(사내 wisenut vLLM) 전처리 LLM 단계 전용 env.
      LLOA_API_KEY: ${LLOA_API_KEY:-}
      LLOA_API_URL: ${LLOA_API_URL:-http://210.180.82.135:9023/v1/chat/completions}
      LLOA_MODEL: ${LLOA_MODEL:-wisenut/wise-lloa-max-v1.2.1}
      LLOA_MODEL_DISPLAY_NAME: ${LLOA_MODEL_DISPLAY_NAME:-}
      LLOA_MAX_TOKENS: ${LLOA_MAX_TOKENS:-65536}
      LLOA_TIMEOUT_SEC: ${LLOA_TIMEOUT_SEC:-180}
      LLOA_REASONING_EFFORT: ${LLOA_REASONING_EFFORT:-low}
      LLOA_PREPEND_NO_THINK: ${LLOA_PREPEND_NO_THINK:-true}
      # silverone 2026-06-04 — worker 운영 안정화 (Codex review #2). 무제한
      # Content-Length / 동시 처리 / shutdown grace를 ceiling으로 방어.
      # <=0이면 해당 제한 해제 (max_request_bytes / max_concurrent).
      PYTHON_AI_MAX_REQUEST_BYTES: ${PYTHON_AI_MAX_REQUEST_BYTES:-10485760}
      PYTHON_AI_MAX_CONCURRENT_REQUESTS: ${PYTHON_AI_MAX_CONCURRENT_REQUESTS:-32}
      PYTHON_AI_SHUTDOWN_GRACE_SEC: ${PYTHON_AI_SHUTDOWN_GRACE_SEC:-10}
    ports:
      - "127.0.0.1:18090:8090"
    volumes:
      - ./data:/workspace/data
    restart: unless-stopped

  control-plane:
    # silverone 2026-06-04 — control-plane과 temporal-worker는 같은 Dockerfile에서
    # server/temporal-worker 두 바이너리를 함께 빌드한 동일 산출물이라, 같은 image
    # tag를 공유해 이미지 중복(디스크 2배)을 없앤다. 차이는 command뿐.
    image: analysis-support-platform-control-plane:dev
    build:
      context: .
      dockerfile: apps/control-plane/Dockerfile
    environment:
      TZ: Asia/Seoul
      BIND_ADDR: :8080
      STORE_BACKEND: postgres
      DATABASE_URL: postgresql://platform:platform@postgres:5432/analysis_support
      DATA_ROOT: /workspace/data
      UPLOAD_ROOT: /workspace/data/uploads
      ARTIFACT_ROOT: /workspace/data/artifacts
      WORKFLOW_ENGINE: temporal
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: analysis-support
      TEMPORAL_BUILD_TASK_QUEUE: analysis-support-build
      TEMPORAL_PERSISTENCE_MODE: dev_ephemeral
      TEMPORAL_RETENTION_MODE: temporal_dev_default
      TEMPORAL_RECOVERY_MODE: startup_reconciliation
      PYTHON_AI_WORKER_URL: http://python-ai-worker:8090
      PYTHON_AI_WORKER_HTTP_TIMEOUT_SEC: ${PYTHON_AI_WORKER_HTTP_TIMEOUT_SEC:-5400}
      PLANNER_BACKEND: python-ai
      # artifact view 응답의 model_display_name을 응답 시점에 입히기 위해 control-plane도
      # LLOA 모델/표시명 env를 읽는다(빌드 snapshot 아님 — .env 변경 즉시 반영).
      LLOA_MODEL: ${LLOA_MODEL:-wisenut/wise-lloa-max-v1.2.1}
      LLOA_MODEL_DISPLAY_NAME: ${LLOA_MODEL_DISPLAY_NAME:-}
      # 인증/RBAC (ADR-025). 값은 .env에서 주입(파일엔 비밀 없음 — 참조만).
      # AUTH_ENABLED 기본 false = 현 사내망 단계 호환. Google 로그인 테스트 시
      # .env에 AUTH_* 채우고 `up -d control-plane`으로 재기동.
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
      AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-}
      AUTH_REDIRECT_URL: ${AUTH_REDIRECT_URL:-}
      AUTH_ALLOWED_DOMAIN: ${AUTH_ALLOWED_DOMAIN:-}
      AUTH_ADMIN_EMAILS: ${AUTH_ADMIN_EMAILS:-}
      AUTH_POST_LOGIN_URL: ${AUTH_POST_LOGIN_URL:-/}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-168}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - ./data:/workspace/data
    depends_on:
      postgres:
        condition: service_healthy
      python-ai-worker:
        condition: service_started
      temporal:
        condition: service_started
    restart: unless-stopped

  temporal-worker:
    # control-plane과 동일 image 공유 (위 주석 참조). command만 다르다.
    # build 정의는 control-plane에만 두고 여기선 image만 참조한다 — 같은 tag를
    # 두 서비스가 동시에 build하면 buildkit이 "image already exists"로 실패하기 때문.
    # control-plane이 tag를 만들고 temporal-worker는 그 image를 재사용한다(depends_on).
    image: analysis-support-platform-control-plane:dev
    command: ["/usr/local/bin/temporal-worker"]
    environment:
      TZ: Asia/Seoul
      WORKFLOW_ENGINE: temporal
      STORE_BACKEND: postgres
      DATABASE_URL: postgresql://platform:platform@postgres:5432/analysis_support
      DATA_ROOT: /workspace/data
      UPLOAD_ROOT: /workspace/data/uploads
      ARTIFACT_ROOT: /workspace/data/artifacts
      DUCKDB_PATH: /workspace/data/analysis_support.duckdb
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: analysis-support
      TEMPORAL_BUILD_TASK_QUEUE: analysis-support-build
      TEMPORAL_PERSISTENCE_MODE: dev_ephemeral
      TEMPORAL_RETENTION_MODE: temporal_dev_default
      TEMPORAL_RECOVERY_MODE: startup_reconciliation
      TEMPORAL_ANALYSIS_MAX_CONCURRENT_ACTIVITIES: 8
      TEMPORAL_BUILD_MAX_CONCURRENT_ACTIVITIES: 4
      DATASET_BUILD_PREPARE_MAX_CONCURRENT: 3
      DATASET_BUILD_SENTIMENT_MAX_CONCURRENT: 2
      DATASET_BUILD_EMBEDDING_MAX_CONCURRENT: 1
      PYTHON_AI_WORKER_URL: http://python-ai-worker:8090
      PYTHON_AI_WORKER_HTTP_TIMEOUT_SEC: ${PYTHON_AI_WORKER_HTTP_TIMEOUT_SEC:-5400}
    depends_on:
      postgres:
        condition: service_healthy
      python-ai-worker:
        condition: service_started
      temporal:
        condition: service_started
      # 공유 image(analysis-support-platform-control-plane:dev)를 control-plane이
      # 빌드하므로 그 뒤에 올라오게 한다 (image 재사용 보장).
      control-plane:
        condition: service_started
    volumes:
      - ./data:/workspace/data
    restart: unless-stopped

  # silverone 2026-06-01 — web(Vite+React SPA) 빌드 후 nginx 정적 serve (Option B).
  # 동일출처 구조: 브라우저는 web(:5173)만 호출하고, nginx가 /api/* 를 control-plane
  # 으로 reverse-proxy(prefix 제거)한다. axios는 VITE_API_BASE_URL=/api 로 빌드되어
  # `/api/...` 로 요청 → 동일출처라 Content-Disposition 등 응답 헤더가 JS에 노출되어
  # 다운로드 파일명이 정상 동작한다(백엔드 CORS 수정 불필요).
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - control-plane
    restart: unless-stopped

volumes:
  postgres_dev_data:
