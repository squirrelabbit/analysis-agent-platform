# 스테이징/내부 서버 배포 override (silverone 2026-06-01).
# dev compose(compose.dev.yml)는 127.0.0.1 loopback 바인딩 그대로 두고, 이 파일을
# 얹어 web만 외부로 노출한다.
#
# 사용:
#   1) 같은 디렉터리에 .env 작성 (시크릿 — .env.example 복사 후 키 채우기)
#   2) docker compose -f compose.dev.yml -f compose.staging.yml up -d --build
#
# web(SPA + /api reverse-proxy)만 외부로 연다. control-plane / python-ai-worker /
# postgres / temporal 은 docker 내부 네트워크로만 통신하므로 외부 포트를 열지
# 않는다(공격면 최소화). 흐름: 브라우저 → web(:5173) → nginx /api 프록시 →
# control-plane:8080(내부). 그래서 control-plane host 포트는 SPA 동작에 불필요.
#
# !override 는 dev의 ports 리스트를 병합하지 않고 통째로 교체한다 (Compose 2.24+).
# 서버 compose가 구버전이면: 이 파일 대신 compose.dev.yml 의 web 포트
# `127.0.0.1:5173:80` → `5173:80` 로 직접 바꿔도 된다.
services:
  web:
    ports: !override
      - "5173:80"   # 0.0.0.0:5173. 도메인 80 직결하려면 "80:80" 으로.
